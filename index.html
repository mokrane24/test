<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner Balance Simple</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #000; color: #fff; font-family: monospace; }
        #video { width: 100%; height: 60vh; display: block; }
        .controls { background: #000; padding: 20px; text-align: center; }
        #weight { font-size: 5rem; font-weight: bold; color: #0f0; margin: 20px 0; }
        button { padding: 15px 30px; font-size: 18px; background: #0f0; color: #000; border: none; cursor: pointer; font-weight: bold; margin: 10px; }
        button:hover { background: #0a0; }
        canvas { width: 100%; margin: 20px 0; border: 1px solid #333; }
        #info { color: #666; margin-top: 10px; font-size: 12px; }
    </style>
</head>
<body>

<video id="video" autoplay playsinline muted></video>

<div class="controls">
    <button id="scan">SCANNER</button>
    <div id="weight">----</div>
    <canvas id="preview" width="400" height="100"></canvas>
    <div id="info">Prêt</div>
</div>

<script>
    const video = document.getElementById('video');
    const scanBtn = document.getElementById('scan');
    const weight = document.getElementById('weight');
    const preview = document.getElementById('preview');
    const info = document.getElementById('info');

    let locked = null;
    let stability = 0;
    let lastText = null;

    // Caméra
    navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
        .then(stream => video.srcObject = stream)
        .catch(err => info.innerText = 'Erreur caméra: ' + err.message);

    scanBtn.addEventListener('click', async () => {
        if (video.videoWidth === 0) {
            info.innerText = 'Vidéo non prête';
            return;
        }

        scanBtn.disabled = true;
        info.innerText = 'Scan en cours...';

        // Capturer région du centre (où sont les chiffres)
        const w = video.videoWidth;
        const h = video.videoHeight;
        const x = Math.floor(w * 0.1);
        const y = Math.floor(h * 0.25);
        const cw = Math.floor(w * 0.8);
        const ch = Math.floor(h * 0.25);

        const canvas = document.createElement('canvas');
        canvas.width = 600;
        canvas.height = 150;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, x, y, cw, ch, 0, 0, 600, 150);

        // Afficher l'image capturée
        const pctx = preview.getContext('2d');
        pctx.drawImage(canvas, 0, 0, preview.width, preview.height);

        try {
            // OCR SIMPLE - SANS PREPROCESSING
            const result = await Tesseract.recognize(canvas, 'eng', {
                tessedit_char_whitelist: '0123456789.',
                tessedit_pageseg_mode: '7'
            });

            let text = result.data.text.trim();
            
            // Juste enlever les caractères nuls
            text = text.replace(/[^0-9.]/g, '');
            
            if (!text) {
                info.innerText = 'Aucun texte détecté';
                scanBtn.disabled = false;
                return;
            }

            // Stabilité
            if (lastText === text) {
                stability++;
            } else {
                stability = 1;
                lastText = text;
            }

            weight.innerText = text;
            info.innerText = `Résultat: "${text}" | Confiance: ${(result.data.confidence * 100).toFixed(0)}% | Stabilité: ${stability}/3`;

            if (stability >= 3) {
                weight.style.color = '#0f0';
                locked = text;
                info.innerText = '✓ VERROUILLÉ: ' + text;
            } else {
                weight.style.color = '#ff0';
            }

        } catch(e) {
            info.innerText = 'Erreur OCR: ' + e.message;
        }

        scanBtn.disabled = false;
    });
</script>
</body>
</html>
