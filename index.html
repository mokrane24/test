<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner LED Rouge Pur</title>
    <style>
        body { margin: 0; padding: 0; background: #000; color: #fff; font-family: monospace; }
        
        .container { display: flex; flex-direction: column; height: 100vh; }
        
        #video { 
            width: 100%; 
            height: 50vh; 
            display: block;
            position: relative;
        }
        
        .roi-guide {
            position: absolute;
            top: 20%;
            left: 5%;
            width: 90%;
            height: 30%;
            border: 3px dashed #ff0000;
            box-shadow: 0 0 15px #ff0000;
            pointer-events: none;
            z-index: 10;
        }
        
        .controls { 
            background: #0a0a0a;
            padding: 20px;
            overflow-y: auto;
            flex: 1;
        }
        
        .section {
            margin-bottom: 20px;
            background: #1a1a1a;
            padding: 15px;
            border-radius: 8px;
            border-left: 3px solid #ff0000;
        }
        
        .section-title {
            font-weight: bold;
            margin-bottom: 10px;
            color: #ff0000;
        }
        
        #weight { 
            font-size: 4rem; 
            font-weight: bold; 
            color: #ff0000;
            margin: 20px 0;
            text-align: center;
        }
        
        button { 
            padding: 12px 25px; 
            font-size: 14px; 
            background: #ff0000; 
            color: #fff; 
            border: none; 
            cursor: pointer; 
            font-weight: bold;
            margin: 5px;
            border-radius: 4px;
        }
        
        button:hover { background: #ff3333; }
        button:disabled { background: #666; cursor: not-allowed; }
        
        canvas { 
            width: 100%;
            border: 1px solid #333;
            margin: 10px 0;
            background: #000;
        }
        
        #info { 
            color: #999; 
            margin-top: 10px; 
            font-size: 12px;
            line-height: 1.6;
        }
        
        .preview-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 10px 0;
        }
        
        .preview-item {
            background: #000;
            padding: 10px;
            border: 1px solid #333;
            border-radius: 4px;
        }
        
        .preview-label {
            font-size: 10px;
            color: #666;
            margin-bottom: 5px;
        }
        
        .preview-item canvas {
            margin: 0;
        }
    </style>
</head>
<body>

<div class="container">
    <div style="position: relative;">
        <video id="video" autoplay playsinline muted></video>
        <div class="roi-guide"></div>
    </div>

    <div class="controls">
        <!-- RÉSULTAT -->
        <div class="section">
            <div class="section-title">📊 POIDS DÉTECTÉ</div>
            <div id="weight">----</div>
            <div id="info">En attente...</div>
        </div>

        <!-- PRÉVISUALISATIONS -->
        <div class="section">
            <div class="section-title">🔴 EXTRACTION LED ROUGE</div>
            <div class="preview-row">
                <div class="preview-item">
                    <div class="preview-label">ORIGINAL</div>
                    <canvas id="original" width="200" height="80"></canvas>
                </div>
                <div class="preview-item">
                    <div class="preview-label">ROUGE EXTRAIT</div>
                    <canvas id="red-only" width="200" height="80"></canvas>
                </div>
            </div>
            <div class="preview-row">
                <div class="preview-item">
                    <div class="preview-label">BINARISÉ</div>
                    <canvas id="binary" width="200" height="80"></canvas>
                </div>
                <div class="preview-item">
                    <div class="preview-label">NETTOYÉ</div>
                    <canvas id="cleaned" width="200" height="80"></canvas>
                </div>
            </div>
        </div>

        <!-- BOUTONS -->
        <div class="section">
            <button id="scan">📸 SCANNER</button>
            <button id="reset">🔄 RESET</button>
        </div>
    </div>
</div>

<script>
    const video = document.getElementById('video');
    const scanBtn = document.getElementById('scan');
    const resetBtn = document.getElementById('reset');
    const weight = document.getElementById('weight');
    const info = document.getElementById('info');

    const canvasOriginal = document.getElementById('original');
    const canvasRedOnly = document.getElementById('red-only');
    const canvasBinary = document.getElementById('binary');
    const canvasCleaned = document.getElementById('cleaned');

    let locked = null;
    let stability = 0;
    let lastText = null;

    // Caméra
    navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
        .then(stream => {
            video.srcObject = stream;
            info.innerText = '✓ Caméra active\nCadrez les chiffres LED rouges\nPuis cliquez SCANNER';
        })
        .catch(err => {
            info.innerText = '✗ Erreur caméra:\n' + err.message;
        });

    function extractRedAndAnalyze() {
        if (video.videoWidth === 0) {
            info.innerText = '✗ Vidéo non prête';
            return null;
        }

        scanBtn.disabled = true;
        info.innerText = '⏳ Traitement...';

        // ROI fixe (20% top, 30% height, 5% left, 90% width)
        const vw = video.videoWidth;
        const vh = video.videoHeight;
        const x = Math.floor(vw * 0.05);
        const y = Math.floor(vh * 0.20);
        const w = Math.floor(vw * 0.90);
        const h = Math.floor(vh * 0.30);

        // Canvas temporaire
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = 400;
        tempCanvas.height = 120;
        const ctx = tempCanvas.getContext('2d');
        ctx.drawImage(video, x, y, w, h, 0, 0, 400, 120);

        // Afficher original
        const origCtx = canvasOriginal.getContext('2d');
        origCtx.drawImage(tempCanvas, 0, 0, 200, 80);

        // Extraire les pixels ROUGES uniquement
        let imgData = ctx.getImageData(0, 0, 400, 120);
        const data = imgData.data;

        // Compter pixels rouges
        let redPixelCount = 0;
        for (let i = 0; i < data.length; i += 4) {
            const r = data[i];
            const g = data[i+1];
            const b = data[i+2];

            // LED rouge: R élevé, G et B bas
            const isRed = r > 100 && g < 80 && b < 80;
            
            if (isRed) {
                redPixelCount++;
                data[i] = 255;     // R = blanc
                data[i+1] = 255;   // G
                data[i+2] = 255;   // B
            } else {
                data[i] = 0;       // R = noir
                data[i+1] = 0;     // G
                data[i+2] = 0;     // B
            }
            data[i+3] = 255;
        }

        ctx.putImageData(imgData, 0, 0);

        // Afficher extraction rouge
        const redCtx = canvasRedOnly.getContext('2d');
        redCtx.drawImage(tempCanvas, 0, 0, 200, 80);

        // Binariser (noir/blanc strict)
        imgData = ctx.getImageData(0, 0, 400, 120);
        let whitePixels = 0;
        for (let i = 0; i < data.length; i += 4) {
            const val = data[i] > 128 ? 255 : 0;
            data[i] = data[i+1] = data[i+2] = val;
            if (val > 128) whitePixels++;
        }
        ctx.putImageData(imgData, 0, 0);

        // Afficher binarisé
        const binCtx = canvasBinary.getContext('2d');
        binCtx.drawImage(tempCanvas, 0, 0, 200, 80);

        // Morphologie: dilate pour remplir trous
        const dilated = dilate(imgData, 2);
        ctx.putImageData(dilated, 0, 0);

        // Afficher nettoyé
        const cleanCtx = canvasCleaned.getContext('2d');
        cleanCtx.drawImage(tempCanvas, 0, 0, 200, 80);

        // Analyser: diviser en 8 colonnes (max 8 chiffres)
        const data2 = dilated.data;
        let result = '';
        const colWidth = 400 / 8;

        for (let col = 0; col < 8; col++) {
            const x1 = Math.floor(col * colWidth);
            const x2 = Math.floor((col + 1) * colWidth);

            let whiteCount = 0;
            let totalCount = 0;

            for (let y = 0; y < 120; y++) {
                for (let x = x1; x < x2; x++) {
                    const idx = (y * 400 + x) * 4;
                    if (data2[idx] > 128) whiteCount++;
                    totalCount++;
                }
            }

            const density = whiteCount / totalCount;

            if (density > 0.02) {
                // Il y a quelque chose
                if (density < 0.08) {
                    result += '1';
                } else if (density < 0.12) {
                    result += '7';
                } else if (density < 0.20) {
                    result += '4';
                } else if (density < 0.30) {
                    result += '0';
                } else if (density < 0.40) {
                    result += '6';
                } else if (density < 0.50) {
                    result += '9';
                } else {
                    result += '8';
                }
            }
        }

        // Nettoyer résultat
        result = result.replace(/[^0-9]/g, '');

        const redDensity = (redPixelCount / (400 * 120) * 100).toFixed(1);
        const whiteDensity = (whitePixels / (400 * 120) * 100).toFixed(1);

        info.innerText = `Pixels rouges: ${redDensity}%\nPixels blancs: ${whiteDensity}%\nRésultat: "${result}"\nDensités: ${Array.from(result).map((_, i) => {
            const x1 = Math.floor(i * 50);
            const x2 = Math.floor((i + 1) * 50);
            let count = 0;
            for (let y = 0; y < 120; y++) {
                for (let x = x1; x < x2; x++) {
                    const idx = (y * 400 + x) * 4;
                    if (data2[idx] > 128) count++;
                }
            }
            return (count / (50 * 120) * 100).toFixed(0) + '%';
        }).join(', ')}`;

        scanBtn.disabled = false;
        return result;
    }

    function dilate(imageData, kernel) {
        const data = imageData.data;
        const w = 400, h = 120;
        const temp = new Uint8ClampedArray(data);

        for (let y = kernel; y < h - kernel; y++) {
            for (let x = kernel; x < w - kernel; x++) {
                let maxVal = 0;
                for (let dy = -kernel; dy <= kernel; dy++) {
                    for (let dx = -kernel; dx <= kernel; dx++) {
                        maxVal = Math.max(maxVal, temp[((y + dy) * w + (x + dx)) * 4]);
                    }
                }
                const idx = (y * w + x) * 4;
                data[idx] = data[idx+1] = data[idx+2] = maxVal;
            }
        }
        return imageData;
    }

    scanBtn.addEventListener('click', () => {
        const result = extractRedAndAnalyze();
        
        if (!result) {
            weight.innerText = '----';
            weight.style.color = '#ff0000';
            return;
        }

        if (lastText === result) {
            stability++;
        } else {
            stability = 1;
            lastText = result;
        }

        weight.innerText = result || '----';
        weight.style.color = stability >= 3 ? '#00ff00' : '#ff8888';

        info.innerText += `\n\nStabilité: ${stability}/3`;
        if (stability >= 3) {
            locked = result;
            info.innerText += '\n✓ VERROUILLÉ';
        }
    });

    resetBtn.addEventListener('click', () => {
        locked = null;
        stability = 0;
        lastText = null;
        weight.innerText = '----';
        weight.style.color = '#ff0000';
        info.innerText = '✓ Réinitialisé';
    });
</script>
</body>
</html>
