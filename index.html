<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Scanner de Chiffres</title>
    <style>
        body { font-family: sans-serif; text-align: center; }
        video, canvas { width: 100%; max-width: 500px; border-radius: 8px; }
        #result { font-size: 2rem; color: #007bff; font-weight: bold; }
        .controls { margin: 20px; }
    </style>
</head>
<body>

    <h2>Scan de Chiffres</h2>
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas" style="display:none;"></canvas>
    
    <div class="controls">
        <button id="capture">Scanner le chiffre</button>
    </div>

    <div id="result">Résultat : ---</div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const result = document.getElementById('result');
        const captureBtn = document.getElementById('capture');

        // 1. Accéder à la caméra
        navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
            .then(stream => { video.srcObject = stream; })
            .catch(err => console.error("Erreur caméra : ", err));

        // 2. Logique de capture
        captureBtn.addEventListener('click', () => {
            const context = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            // C'est ici qu'on analyse l'image
            analyserImage(canvas);
        });

        function analyserImage(cvs) {
            result.innerText = "Analyse en cours...";
            // Voir options ci-dessous
        }
    </script>
</body>
</html>
