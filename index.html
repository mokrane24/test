<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner de Chiffres Ultra-Simple</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f4f4f9;
            margin: 0;
            padding: 20px;
        }
        h2 { color: #333; }
        #container {
            position: relative;
            width: 100%;
            max-width: 400px;
            border: 5px solid #333;
            border-radius: 15px;
            overflow: hidden;
            background: #000;
        }
        video {
            width: 100%;
            display: block;
        }
        /* Le rectangle de visée */
        #overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 250px;
            height: 100px;
            border: 3px dashed #00ff00;
            box-shadow: 0 0 0 1000px rgba(0, 0, 0, 0.5);
            pointer-events: none;
        }
        .controls {
            margin-top: 20px;
        }
        button {
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
        }
        button:active { transform: scale(0.95); }
        #result-box {
            margin-top: 20px;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            min-width: 200px;
            text-align: center;
        }
        #resultat {
            font-size: 2.5rem;
            font-weight: bold;
            color: #007bff;
            display: block;
        }
    </style>
</head>
<body>

    <h2>Scanner de Chiffres</h2>

    <div id="container">
        <video id="video" autoplay playsinline></video>
        <div id="overlay"></div>
    </div>

    <div class="controls">
        <button id="btnCapture">SCANNER MAINTENANT</button>
    </div>

    <div id="result-box">
        <span>Résultat détecté :</span>
        <span id="resultat">---</span>
    </div>

    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const resultat = document.getElementById('resultat');
        const btnCapture = document.getElementById('btnCapture');

        // --- CONFIGURATION ---
        const API_KEY = 'K87978899088957'; // <--- METS TA CLÉ ICI

        // 1. Démarrer la caméra
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } } 
                });
                video.srcObject = stream;
            } catch (err) {
                alert("Erreur caméra : " + err.message);
            }
        }

        // 2. Capture et traitement
        btnCapture.addEventListener('click', async () => {
            resultat.innerText = "Analyse...";
            
            const context = canvas.getContext('2d');
            
            // On définit la taille du canvas selon la vidéo
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;

            // --- TRAITEMENT D'IMAGE ---
            // On applique un filtre pour aider l'OCR (Contraste élevé + Noir et Blanc)
            context.filter = 'contrast(150%) grayscale(100%)';
            context.drawImage(video, 0, 0, canvas.width, canvas.height);

            // On convertit en Base64 (JPEG pour la légèreté)
            const base64Image = canvas.toDataURL('image/jpeg', 0.8);

            // 3. Appel à l'API OCR.space
            const formData = new FormData();
            formData.append("base64Image", base64Image);
            formData.append("language", "eng");
            formData.append("apikey", API_KEY);
            // Mode spécifique pour améliorer la reconnaissance des chiffres
            formData.append("isTable", "true"); 
            formData.append("OCREngine", "2"); // Le moteur 2 est souvent meilleur pour les chiffres

            try {
                const response = await fetch("https://api.ocr.space/parse/image", {
                    method: "POST",
                    body: formData
                });

                const data = await response.json();

                if (data.ParsedResults && data.ParsedResults.length > 0) {
                    const texteBrut = data.ParsedResults[0].ParsedText;
                    
                    // Nettoyage : On ne garde QUE les chiffres avec une Regex
                    const chiffresNettoyes = texteBrut.replace(/[^0-9]/g, '');
                    
                    resultat.innerText = chiffresNettoyes !== "" ? chiffresNettoyes : "Rien trouvé";
                } else {
                    resultat.innerText = "Erreur API";
                }
            } catch (error) {
                resultat.innerText = "Erreur réseau";
                console.error(error);
            }
        });

        startCamera();
    </script>
</body>
</html>
