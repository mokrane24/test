<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner de Chiffres Précis</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #121212;
            color: white;
            margin: 0;
            padding: 20px;
        }
        #container {
            position: relative;
            width: 100%;
            max-width: 400px;
            border-radius: 15px;
            overflow: hidden;
            border: 4px solid #333;
        }
        video { width: 100%; display: block; }
        
        /* Rectangle de visée amélioré */
        #overlay {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 240px; height: 80px;
            border: 3px solid #00ff00;
            box-shadow: 0 0 0 1000px rgba(0, 0, 0, 0.7);
            pointer-events: none;
        }
        
        .controls { margin-top: 20px; width: 100%; text-align: center; }
        button {
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
        }
        
        #result-box {
            margin-top: 20px;
            padding: 15px;
            background: #222;
            border-radius: 10px;
            width: 250px;
            text-align: center;
            border: 1px solid #444;
        }
        #resultat { font-size: 2.5rem; font-weight: bold; color: #00d4ff; display: block; }
        
        /* Petit aperçu pour voir ce que l'API reçoit réellement */
        #previewCanvas {
            margin-top: 10px;
            border: 1px solid #555;
            background: white;
            width: 240px;
        }
    </style>
</head>
<body>

    <h2>Scanner de Chiffres</h2>

    <div id="container">
        <video id="video" autoplay playsinline></video>
        <div id="overlay"></div>
    </div>

    <div class="controls">
        <button id="btnCapture">SCANNER MAINTENANT</button>
    </div>

    <div id="result-box">
        <span style="font-size: 0.9rem; color: #888;">Résultat détecté :</span>
        <span id="resultat">---</span>
    </div>

    <p style="font-size: 0.8rem; color: #555; margin-top:10px;">Aperçu envoyé à l'API :</p>
    <canvas id="previewCanvas"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('previewCanvas');
        const resultat = document.getElementById('resultat');
        const btnCapture = document.getElementById('btnCapture');

        // --- CONFIGURATION ---
        const API_KEY = 'K87978899088957'; 

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment', width: 1280, height: 720 } 
                });
                video.srcObject = stream;
            } catch (err) {
                alert("Erreur caméra : " + err.message);
            }
        }

        btnCapture.addEventListener('click', async () => {
            resultat.innerText = "...";
            const ctx = canvas.getContext('2d');
            
            // 1. DÉFINITION DE LA ZONE DE COUPE (CROP)
            // On définit la zone correspondant au rectangle vert (240x80)
            const cropW = 240;
            const cropH = 80;
            canvas.width = cropW;
            canvas.height = cropH;

            const sourceX = (video.videoWidth - cropW) / 2;
            const sourceY = (video.videoHeight - cropH) / 2;

            // Dessiner uniquement la partie centrale
            ctx.drawImage(video, sourceX, sourceY, cropW, cropH, 0, 0, cropW, cropH);

            // 2. TRAITEMENT PIXEL PAR PIXEL (BINARISATION)
            const imgData = ctx.getImageData(0, 0, cropW, cropH);
            const d = imgData.data;
            for (let i = 0; i < d.length; i += 4) {
                const avg = (d[i] + d[i + 1] + d[i + 2]) / 3;
                // Si le pixel est gris foncé, on le rend NOIR, sinon BLANC
                const threshold = 120; 
                const color = avg < threshold ? 0 : 255;
                d[i] = d[i+1] = d[i+2] = color;
            }
            ctx.putImageData(imgData, 0, 0);

            // 3. ENVOI À L'API
            const base64Image = canvas.toDataURL('image/jpeg', 0.9);
            const formData = new FormData();
            formData.append("base64Image", base64Image);
            formData.append("language", "eng");
            formData.append("apikey", API_KEY);
            formData.append("OCREngine", "2"); 

            try {
                const response = await fetch("https://api.ocr.space/parse/image", {
                    method: "POST",
                    body: formData
                });
                const data = await response.json();

                if (data.ParsedResults && data.ParsedResults.length > 0) {
                    const texte = data.ParsedResults[0].ParsedText;
                    const chiffres = texte.replace(/[^0-9]/g, '');
                    resultat.innerText = chiffres !== "" ? chiffres : "Non reconnu";
                } else {
                    resultat.innerText = "Erreur";
                }
            } catch (error) {
                resultat.innerText = "Réseau HS";
            }
        });

        startCamera();
    </script>
</body>
</html>
