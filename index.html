<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Scanner Balance PRO (Stable)</title>

<style>
body { background:#000; color:#fff; text-align:center; font-family:monospace; }
video { width:100%; height:50vh; }
#weight { font-size:4rem; margin:20px; }
.roi { position:absolute; border:3px solid red; top:30%; left:20%; width:60%; height:15%; }
</style>
</head>

<body>

<div style="position:relative">
<video id="video" autoplay playsinline></video>
<div class="roi"></div>
</div>

<div id="weight">----</div>
<button onclick="start()">START</button>

<canvas id="canvas" width="400" height="120"></canvas>

<script>

const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const weight = document.getElementById('weight');

navigator.mediaDevices.getUserMedia({ video: { facingMode:"environment" } })
.then(stream => video.srcObject = stream);

// =======================
// PREPROCESSING ROBUSTE
// =======================
function preprocess(imgData) {
    const d = imgData.data;

    for (let i=0;i<d.length;i+=4){
        let gray = 0.3*d[i] + 0.59*d[i+1] + 0.11*d[i+2];

        // threshold dynamique
        let val = gray > 100 ? 255 : 0;

        d[i]=d[i+1]=d[i+2]=val;
    }

    return imgData;
}

// =======================
// SEGMENT DETECTION
// =======================
function detectDigit(block) {

    const w = block.width;
    const h = block.height;
    const data = block.data;

    function count(x1,y1,x2,y2){
        let c=0,t=0;
        for(let y=y1;y<y2;y++){
            for(let x=x1;x<x2;x++){
                const i=(y*w+x)*4;
                if(data[i]>128) c++;
                t++;
            }
        }
        return c/t;
    }

    const seg = [
        count(w*0.2,h*0.05,w*0.8,h*0.15), // top
        count(w*0.8,h*0.2,w*0.9,h*0.5),   // top-right
        count(w*0.8,h*0.5,w*0.9,h*0.8),   // bottom-right
        count(w*0.2,h*0.85,w*0.8,h*0.95), // bottom
        count(w*0.1,h*0.5,w*0.2,h*0.8),   // bottom-left
        count(w*0.1,h*0.2,w*0.2,h*0.5),   // top-left
        count(w*0.2,h*0.45,w*0.8,h*0.55)  // middle
    ].map(v=>v>0.2?1:0);

    const map = {
        "1110111":"0",
        "0010010":"1",
        "1011101":"2",
        "1011011":"3",
        "0111010":"4",
        "1101011":"5",
        "1101111":"6",
        "1010010":"7",
        "1111111":"8",
        "1111011":"9"
    };

    return map[seg.join("")] || "";
}

// =======================
// LECTURE COMPLETE
// =======================
function readDigits(imgData) {

    const w = 400;
    const h = 120;
    const digitWidth = w / 4;

    let result = "";

    for (let i=0;i<4;i++){
        const x = i * digitWidth;

        const block = ctx.getImageData(x,0,digitWidth,h);
        result += detectDigit(block);
    }

    return result;
}

// =======================
// STABILISATION
// =======================
let hist=[];

function stabilize(val){
    if(!val) return null;
    hist.push(val);
    if(hist.length>5) hist.shift();

    const count={};
    hist.forEach(v=>count[v]=(count[v]||0)+1);

    let best=null,max=0;
    for(let k in count){
        if(count[k]>max){best=k;max=count[k];}
    }

    return max>=3?best:null;
}

// =======================
// LOOP
// =======================
async function start(){

    while(true){

        const vw = video.videoWidth;
        const vh = video.videoHeight;

        ctx.drawImage(video, vw*0.2, vh*0.3, vw*0.6, vh*0.15, 0,0,400,120);

        let img = ctx.getImageData(0,0,400,120);
        img = preprocess(img);
        ctx.putImageData(img,0,0);

        const txt = readDigits(img);
        const stable = stabilize(txt);

        if(stable){
            weight.innerText = stable;
            weight.style.color = "lime";
        }else{
            weight.innerText = txt || "----";
            weight.style.color = "orange";
        }

        await new Promise(r=>setTimeout(r,200));
    }
}

</script>

</body>
</html>
