<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Balance - 7 Segments</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #1a1a1a; color: #fff; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 30px; }
        
        #video-container { position: relative; background: #000; border-radius: 10px; overflow: hidden; margin-bottom: 20px; aspect-ratio: 4/3; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        .overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80%; height: 30%; border: 3px solid #00ff00; border-radius: 8px; }
        
        .controls { display: flex; gap: 10px; margin-bottom: 20px; }
        button { flex: 1; padding: 12px; background: #0066cc; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:hover { background: #0052a3; }
        button:disabled { background: #666; cursor: not-allowed; }
        
        .result { 
            background: #222; 
            padding: 20px; 
            border-radius: 10px; 
            text-align: center; 
            margin-bottom: 20px;
            border-left: 4px solid #00ff00;
        }
        .result-value { font-size: 48px; font-family: monospace; font-weight: bold; margin: 10px 0; color: #00ff00; }
        .result-confidence { font-size: 12px; color: #999; }
        
        .debug-panel { 
            background: #0a0a0a; 
            padding: 15px; 
            border-radius: 8px; 
            font-family: monospace; 
            font-size: 12px; 
            color: #0f0; 
            max-height: 200px; 
            overflow-y: auto;
            margin-top: 20px;
            border: 1px solid #333;
        }
        
        .debug-line { margin: 3px 0; }
        .debug-label { color: #ffff00; font-weight: bold; }
        
        canvas { display: none; }
    </style>
</head>
<body>

    <div class="container">
        <h1>⚖️ Scanner Balance 7-Segments</h1>
        
        <div id="video-container">
            <video id="webcam" autoplay playsinline></video>
            <div class="overlay"></div>
        </div>

        <div class="controls">
            <button id="scan-btn">📷 Scanner</button>
            <button id="debug-btn">🔍 Debug ON/OFF</button>
        </div>

        <div class="result">
            <div style="font-size: 12px; color: #999;">Poids détecté</div>
            <div id="result" class="result-value">--</div>
            <div id="confidence" class="result-confidence"></div>
        </div>

        <div id="debug-panel" class="debug-panel" style="display:none;"></div>
    </div>

    <canvas id="canvas"></canvas>
    <canvas id="roi-canvas"></canvas>

    <script>
        class BalanceScanner {
            constructor() {
                this.video = document.getElementById('webcam');
                this.scanBtn = document.getElementById('scan-btn');
                this.debugBtn = document.getElementById('debug-btn');
                this.resultDiv = document.getElementById('result');
                this.confidenceDiv = document.getElementById('confidence');
                this.debugPanel = document.getElementById('debug-panel');
                
                this.canvas = document.getElementById('canvas');
                this.roiCanvas = document.getElementById('roi-canvas');
                
                this.debugMode = false;
                
                this.scanBtn.addEventListener('click', () => this.scan());
                this.debugBtn.addEventListener('click', () => {
                    this.debugMode = !this.debugMode;
                    this.debugPanel.style.display = this.debugMode ? 'block' : 'none';
                    this.debugPanel.innerHTML = '';
                });
                
                this.startCamera();
            }

            log(label, text) {
                if (!this.debugMode) return;
                const line = document.createElement('div');
                line.className = 'debug-line';
                line.innerHTML = `<span class="debug-label">${label}:</span> ${text}`;
                this.debugPanel.appendChild(line);
                this.debugPanel.scrollTop = this.debugPanel.scrollHeight;
            }

            async startCamera() {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({
                        video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
                    });
                    this.video.srcObject = stream;
                } catch (err) {
                    alert('Erreur caméra: ' + err.message);
                }
            }

            // ================== DÉTECTION ROI ==================
            detectROI() {
                const ctx = this.canvas.getContext('2d');
                this.canvas.width = this.video.videoWidth;
                this.canvas.height = this.video.videoHeight;
                
                ctx.drawImage(this.video, 0, 0);
                const imageData = ctx.getImageData(0, 0, this.canvas.width, this.canvas.height);
                
                // Trouver zone de contraste élevé (affichage)
                let maxContrast = 0;
                let bestRect = { x: 0, y: 0, w: this.canvas.width, h: this.canvas.height };
                
                const step = 50;
                for (let y = 0; y < this.canvas.height - step; y += step) {
                    for (let x = 0; x < this.canvas.width - step; x += step) {
                        const contrast = this.getContrast(imageData, x, y, step, step);
                        if (contrast > maxContrast) {
                            maxContrast = contrast;
                            bestRect = { x, y, w: step * 2, h: step };
                        }
                    }
                }
                
                // Centrer et agrandir la ROI
                const centerX = bestRect.x + bestRect.w / 2;
                const centerY = bestRect.y + bestRect.h / 2;
                const roi = {
                    x: Math.max(0, centerX - this.canvas.width * 0.35),
                    y: Math.max(0, centerY - this.canvas.height * 0.15),
                    w: this.canvas.width * 0.7,
                    h: this.canvas.height * 0.3
                };
                
                this.log('ROI', `${roi.w.toFixed(0)}x${roi.h.toFixed(0)} @ (${roi.x.toFixed(0)}, ${roi.y.toFixed(0)})`);
                return roi;
            }

            getContrast(imageData, x, y, w, h) {
                let sum = 0, count = 0;
                const data = imageData.data;
                const stride = imageData.width * 4;
                
                for (let py = y; py < y + h && py < imageData.height; py++) {
                    for (let px = x; px < x + w && px < imageData.width; px++) {
                        const idx = (py * imageData.width + px) * 4;
                        const val = (data[idx] + data[idx+1] + data[idx+2]) / 3;
                        sum += val;
                        count++;
                    }
                }
                
                const avg = sum / count;
                let variance = 0;
                for (let py = y; py < y + h && py < imageData.height; py++) {
                    for (let px = x; px < x + w && px < imageData.width; px++) {
                        const idx = (py * imageData.width + px) * 4;
                        const val = (data[idx] + data[idx+1] + data[idx+2]) / 3;
                        variance += Math.pow(val - avg, 2);
                    }
                }
                
                return Math.sqrt(variance / count);
            }

            // ================== PRÉTRAITEMENT IMAGE ==================
            preprocess(roi) {
                const ctx = this.roiCanvas.getContext('2d');
                this.roiCanvas.width = roi.w;
                this.roiCanvas.height = roi.h;
                
                // Extraire ROI
                ctx.drawImage(this.video, roi.x, roi.y, roi.w, roi.h, 0, 0, roi.w, roi.h);
                let imageData = ctx.getImageData(0, 0, roi.w, roi.h);
                this.log('EXTRACT', `ROI extraite`);
                
                // 1. Grayscale + inversion (car segments LED sont lumineux)
                const data = imageData.data;
                for (let i = 0; i < data.length; i += 4) {
                    const gray = data[i] * 0.299 + data[i+1] * 0.587 + data[i+2] * 0.114;
                    data[i] = data[i+1] = data[i+2] = 255 - gray; // Inverser pour segments LED
                }
                ctx.putImageData(imageData, 0, 0);
                this.log('GRAY', 'Grayscale + inversion LED');
                
                // 2. Seuillage adaptatif pour 7-segments
                imageData = ctx.getImageData(0, 0, roi.w, roi.h);
                this.adaptiveThreshold7Seg(imageData);
                ctx.putImageData(imageData, 0, 0);
                this.log('THRESHOLD', 'Seuil adaptatif 7-seg');
                
                // 3. Dilation légère (combler petits trous)
                imageData = ctx.getImageData(0, 0, roi.w, roi.h);
                this.dilate(imageData, 1);
                ctx.putImageData(imageData, 0, 0);
                this.log('MORPHO', 'Dilatation');
                
                // 4. Contraste haute
                imageData = ctx.getImageData(0, 0, roi.w, roi.h);
                for (let i = 0; i < data.length; i += 4) {
                    const val = data[i];
                    const enhanced = ((val - 128) * 2.5) + 128;
                    data[i] = data[i+1] = data[i+2] = Math.max(0, Math.min(255, enhanced));
                }
                ctx.putImageData(imageData, 0, 0);
                this.log('CONTRAST', 'Amélioré ×2.5');
                
                return this.roiCanvas;
            }

            adaptiveThreshold7Seg(imageData) {
                const data = imageData.data;
                let sum = 0;
                for (let i = 0; i < data.length; i += 4) sum += data[i];
                const avg = sum / (data.length / 4);
                
                // Seuil plus élevé pour segments LED
                const threshold = avg * 1.3;
                for (let i = 0; i < data.length; i += 4) {
                    const val = data[i] > threshold ? 255 : 0;
                    data[i] = data[i+1] = data[i+2] = val;
                }
            }

            dilate(imageData, kernel = 1) {
                const data = imageData.data;
                const w = imageData.width;
                const h = imageData.height;
                const temp = new Uint8ClampedArray(data);
                
                for (let y = kernel; y < h - kernel; y++) {
                    for (let x = kernel; x < w - kernel; x++) {
                        let maxVal = 0;
                        for (let ky = -kernel; ky <= kernel; ky++) {
                            for (let kx = -kernel; kx <= kernel; kx++) {
                                const idx = ((y + ky) * w + (x + kx)) * 4;
                                maxVal = Math.max(maxVal, temp[idx]);
                            }
                        }
                        const idx = (y * w + x) * 4;
                        data[idx] = data[idx+1] = data[idx+2] = maxVal;
                    }
                }
            }

            // ================== OCR HYBRIDE ==================
            async scan() {
                this.scanBtn.disabled = true;
                this.log('SCAN', 'Début');
                
                try {
                    // 1. Détecter ROI
                    const roi = this.detectROI();
                    
                    // 2. Prétraiter
                    const processedCanvas = this.preprocess(roi);
                    
                    // 3. Tesseract
                    const startTime = Date.now();
                    const { data: { text, confidence } } = await Tesseract.recognize(
                        processedCanvas,
                        'eng',
                        {
                            tessedit_char_whitelist: '0123456789.,',
                            tessedit_pageseg_mode: Tesseract.PSM.SINGLE_LINE,
                            tessedit_ocr_engine_mode: Tesseract.OEM.LSTM_ONLY,
                        }
                    );
                    
                    const elapsed = Date.now() - startTime;
                    this.log('OCR', `"${text}" (conf: ${(confidence*100).toFixed(0)}%, ${elapsed}ms)`);
                    
                    // 4. Post-traitement (correction erreurs courantes)
                    let result = text.trim();
                    result = this.correctErrors(result);
                    result = this.validateWeight(result);
                    
                    this.log('CORRECTED', result);
                    
                    if (result && result !== '--') {
                        this.resultDiv.textContent = result;
                        this.resultDiv.style.color = '#00ff00';
                        this.confidenceDiv.textContent = `Confiance: ${(confidence*100).toFixed(0)}% | Temps: ${elapsed}ms`;
                    } else {
                        this.resultDiv.textContent = 'Non détecté';
                        this.resultDiv.style.color = '#ff6666';
                        this.confidenceDiv.textContent = '';
                    }
                    
                } catch (err) {
                    this.log('ERROR', err.message);
                    this.resultDiv.textContent = 'Erreur';
                    this.resultDiv.style.color = '#ff6666';
                } finally {
                    this.scanBtn.disabled = false;
                }
            }

            correctErrors(text) {
                // Corrections fréquentes pour 7-segments
                const corrections = {
                    'O': '0', 'o': '0',
                    'I': '1', 'l': '1',
                    'Z': '2',
                    'B': '8',
                    'S': '5',
                    'G': '9',
                };
                
                for (const [wrong, correct] of Object.entries(corrections)) {
                    text = text.replace(new RegExp(wrong, 'g'), correct);
                }
                
                // Enlever espaces et caractères invalides
                text = text.replace(/\s+/g, '');
                text = text.replace(/[^0-9.,]/g, '');
                
                // Limiter à un point décimal
                const parts = text.split('.');
                if (parts.length > 2) {
                    text = parts[0] + '.' + parts.slice(1).join('');
                }
                
                return text;
            }

            validateWeight(text) {
                // Vérifier format valide poids
                if (!text || !/^[0-9]+(\.[0-9]{1,2})?$/.test(text)) {
                    return '--';
                }
                
                const weight = parseFloat(text);
                // Plage raisonnable pour balances industrielles
                if (weight < 0.1 || weight > 10000) {
                    return '--';
                }
                
                return text;
            }
        }

        window.addEventListener('load', () => {
            new BalanceScanner();
        });
    </script>
</body>
</html>
