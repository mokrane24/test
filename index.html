<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner FINAL - Mokrane</title>
    <style>
        body { background:#000; color:#fff; text-align:center; font-family:sans-serif; margin:0; }
        .cam-container { position:relative; width:100%; height:40vh; background:#111; }
        video { width:100%; height:100%; object-fit:cover; }
        .roi { position:absolute; border:2px solid #0f0; top:30%; left:10%; width:80%; height:30%; pointer-events:none; }
        
        #result-box { padding:20px; background:#1a1a1a; }
        #weight-val { font-size:5rem; color:#0f0; font-weight:bold; width:100%; border:none; background:none; text-align:center; }
        
        canvas { width:90%; height:auto; border:1px solid #444; margin:10px 0; }
        .btns { display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:10px; }
        button { padding:20px; border-radius:10px; border:none; font-weight:bold; font-size:1rem; }
        .btn-ok { background:#0f0; color:#000; grid-column: span 2; font-size:1.4rem; }
    </style>
</head>
<body>

<div class="cam-container">
    <video id="v" autoplay playsinline></video>
    <div class="roi"></div>
</div>

<div id="result-box">
    <canvas id="c"></canvas>
    <input type="text" id="weight-val" value="----">
    <div class="btns">
        <button class="btn-ok" onclick="lock()">VALIDER LE POIDS</button>
        <button style="background:#444; color:#fff;" onclick="location.reload()">RESET</button>
        <button style="background:#0055ff; color:#fff;" onclick="save()">SAVE</button>
    </div>
</div>

<script>
const v = document.getElementById('v');
const c = document.getElementById('c');
const ctx = c.getContext('2d', {alpha: false});
const resInput = document.getElementById('weight-val');

let lastSeen = "";

navigator.mediaDevices.getUserMedia({ video: { facingMode:"environment" } })
    .then(s => v.srcObject = s);

// Mapping des segments 7-segments (Standard Industriel)
const map = {
    "1111110":"0", "0110000":"1", "1101101":"2", "1111001":"3", "0110011":"4",
    "1011011":"5", "1011111":"6", "1110000":"7", "1111111":"8", "1111011":"9"
};

function process() {
    if(v.videoWidth === 0) return requestAnimationFrame(process);
    
    c.width = 400; c.height = 120;
    // Capture de la zone centrale
    ctx.drawImage(v, v.videoWidth*0.1, v.videoHeight*0.3, v.videoWidth*0.8, v.videoHeight*0.3, 0, 0, 400, 120);

    let img = ctx.getImageData(0,0,400,120);
    let d = img.data;
    
    // Seuil automatique (Binarisation)
    let sum = 0;
    for(let i=0; i<d.length; i+=4) sum += (d[i]+d[i+1]+d[i+2])/3;
    let threshold = (sum / (d.length/4)) - 20;

    for(let i=0; i<d.length; i+=4) {
        let brightness = (d[i]+d[i+1]+d[i+2])/3;
        let val = (brightness > threshold) ? 0 : 255; // Segments noirs sur fond blanc
        d[i]=d[i+1]=d[i+2]=val;
    }
    ctx.putImageData(img, 0, 0);

    // DÉTECTION DE CHIFFRES (Recherche de colonnes actives)
    let finalStr = "";
    let inDigit = false;
    let startX = 0;
    let digits = [];

    for(let x=0; x<400; x++) {
        let hasBlack = false;
        for(let y=10; y<110; y++) {
            if(d[(y*400+x)*4] === 0) { hasBlack = true; break; }
        }
        if(hasBlack && !inDigit) { inDigit = true; startX = x; }
        if(!hasBlack && inDigit) {
            inDigit = false;
            if(x - startX > 10) digits.push({x: startX, w: x - startX});
        }
    }

    // ANALYSE DE CHAQUE CHIFFRE TROUVÉ
    digits.forEach(box => {
        function check(px, py, pw, ph) {
            let count = 0, total = 0;
            for(let y=Math.floor(py); y<Math.floor(py+ph); y++) {
                for(let x=Math.floor(px); x<Math.floor(px+pw); x++) {
                    if(d[(y*400+x)*4] === 0) count++;
                    total++;
                }
            }
            return (count/total > 0.3) ? "1" : "0";
        }

        let bx = box.x, bw = box.w, bh = 120;
        let s = "";
        s += check(bx + bw*0.2, 5, bw*0.6, 15);      // top
        s += check(bx + bw*0.7, 15, bw*0.25, 40);   // top-right
        s += check(bx + bw*0.7, 65, bw*0.25, 40);   // bot-right
        s += check(bx + bw*0.2, 100, bw*0.6, 15);   // bottom
        s += check(bx + bw*0.05, 65, bw*0.25, 40);  // bot-left
        s += check(bx + bw*0.05, 15, bw*0.25, 40);  // top-left
        s += check(bx + bw*0.2, 50, bw*0.6, 20);     // middle
        
        finalStr += map[s] || "";
    });

    if(finalStr) {
        lastSeen = finalStr;
        resInput.style.color = "#888"; // Mode "Scan en cours"
        if(resInput.value === "----") resInput.value = finalStr;
    }
    
    requestAnimationFrame(process);
}

function lock() {
    resInput.value = lastSeen;
    resInput.style.color = "#0f0"; // Mode "Validé"
}

function save() {
    alert("Poids enregistré : " + resInput.value);
}

v.onplay = process;
</script>
</body>
</html>
