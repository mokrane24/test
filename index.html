<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner Ultra-Précis</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        :root { --neon: #00ff00; }
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; }
        
        #cam-container { position: relative; flex: 1; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        /* Cadre de visée */
        .target {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80%; height: 20%; border: 2px solid var(--neon);
            box-shadow: 0 0 0 1000px rgba(0,0,0,0.6); z-index: 5;
        }

        /* Panneau de contrôle */
        .controls { background: #1a1a1a; padding: 20px; border-top: 2px solid #333; }
        #result { font-size: 4rem; color: var(--neon); text-align: center; font-family: monospace; margin-bottom: 10px; }
        
        .slider-box { margin-bottom: 20px; text-align: center; }
        input[type=range] { width: 100%; height: 30px; }

        button {
            width: 100%; padding: 20px; background: var(--neon); color: #000;
            border: none; border-radius: 10px; font-weight: bold; font-size: 1.2rem;
        }
        
        #debug-canvas { width: 100%; height: auto; border: 1px solid #555; margin-top: 10px; display: block; }
    </style>
</head>
<body>

    <div id="cam-container">
        <video id="video" autoplay playsinline></video>
        <div class="target"></div>
    </div>

    <div class="controls">
        <div id="result">----</div>
        
        <div class="slider-box">
            <label>Sensibilité (Ajuste pour voir les chiffres noirs) :</label>
            <input type="range" id="threshold" min="50" max="200" value="130">
        </div>

        <button id="btn">LIRE LE POIDS</button>
        
        <p style="font-size: 10px; color: #888;">Aperçu du traitement (doit être bien net) :</p>
        <canvas id="debug-canvas"></canvas>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('debug-canvas');
        const threshInput = document.getElementById('threshold');
        const resDiv = document.getElementById('result');
        const btn = document.getElementById('btn');

        // Initialisation Caméra
        navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
            .then(s => video.srcObject = s);

        // Boucle d'aperçu en temps réel pour régler le curseur
        function updatePreview() {
            const ctx = canvas.getContext('2d');
            const w = video.videoWidth / 4;
            const h = video.videoHeight / 4;
            if (w > 0) {
                canvas.width = w; canvas.height = h;
                ctx.drawImage(video, 0, 0, w, h);
                
                const imgData = ctx.getImageData(0, 0, w, h);
                const d = imgData.data;
                const threshold = threshInput.value;

                for (let i = 0; i < d.length; i += 4) {
                    let avg = (d[i] + d[i+1] + d[i+2]) / 3;
                    let val = (avg > threshold) ? 255 : 0;
                    d[i] = d[i+1] = d[i+2] = val; // Fond blanc, chiffres noirs
                }
                ctx.putImageData(imgData, 0, 0);
            }
            requestAnimationFrame(updatePreview);
        }
        video.onplay = updatePreview;

        // Fonction Scan
        async function scan() {
            btn.disabled = true;
            resDiv.innerText = "...";

            // Utilise le canvas de debug (déjà traité) pour l'OCR
            try {
                const { data: { text } } = await Tesseract.recognize(canvas, 'eng', {
                    tessedit_char_whitelist: '0123456789',
                    tessedit_pageseg_mode: '7'
                });
                
                const clean = text.replace(/[^0-9]/g, "");
                resDiv.innerText = clean || "REFAIRE";
            } catch (e) {
                resDiv.innerText = "ERR";
            }
            btn.disabled = false;
        }

        btn.onclick = scan;
    </script>
</body>
</html>
