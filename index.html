<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Debug 1000%</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #222; color: white; text-align: center; }
        #video { width: 90%; max-width: 400px; border: 2px solid #555; }
        .box { border: 2px solid #00ff00; width: 250px; height: 80px; margin: -100px auto 20px auto; position: relative; z-index: 10; pointer-events: none; }
        #preview { background: white; border: 2px solid red; margin-top: 10px; }
        #res { font-size: 2rem; color: #00ff00; margin: 20px; min-height: 50px; }
        button { padding: 15px 30px; font-size: 1rem; cursor: pointer; background: #28a745; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>

    <h2>OCR Debug Mode</h2>
    <video id="video" autoplay playsinline></video>
    <div class="box"></div>

    <div id="res">CHARGEMENT DE L'IA...</div>

    <button id="go">SCANNER LE CADRE</button>

    <p>Ce que l'IA voit (doit être NET et GROS) :</p>
    <canvas id="preview"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('preview');
        const res = document.getElementById('res');
        const btn = document.getElementById('go');
        let worker = null;

        // 1. Initialisation avec vérification
        (async () => {
            try {
                worker = await Tesseract.createWorker('eng');
                await worker.setParameters({
                    tessedit_char_whitelist: '0123456789',
                    tessedit_pageseg_mode: '13', // Mode spécial "Single Line"
                });
                res.innerText = "IA PRÊTE - PLACEZ UN CHIFFRE";
            } catch(e) {
                res.innerText = "ERREUR CHARGEMENT IA";
            }
        })();

        navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
            .then(s => video.srcObject = s);

        btn.onclick = async () => {
            if(!worker) return;
            res.innerText = "LECTURE...";

            const ctx = canvas.getContext('2d');
            // On capture une zone plus large pour être sûr
            const w = 400; 
            const h = 150;
            canvas.width = w;
            canvas.height = h;

            // On découpe le centre de la vidéo
            const sx = (video.videoWidth - w) / 2;
            const sy = (video.videoHeight - h) / 2;

            ctx.drawImage(video, sx, sy, w, h, 0, 0, w, h);

            // ANALYSE
            const result = await worker.recognize(canvas);
            const text = result.data.text.replace(/[^0-9]/g, '');
            
            res.innerText = text ? "TROUVÉ : " + text : "RIEN DÉTECTÉ";
        };
    </script>
</body>
</html>
