<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner Balance Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        :root { --neon: #00ff00; --bg: #121212; }
        body { margin: 0; font-family: 'Courier New', monospace; background: var(--bg); color: white; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Camera */
        #cam-container { position: relative; flex: 1; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        /* Viseur Industriel */
        .visor {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80%; height: 25%; border: 2px solid var(--neon);
            box-shadow: 0 0 0 1000px rgba(0,0,0,0.7);
            border-radius: 8px; z-index: 5;
        }
        .visor::after { content: "ALIGNER LES CHIFFRES ICI"; position: absolute; top: -25px; left: 0; font-size: 10px; color: var(--neon); }

        /* Interface */
        .ui { background: #1e1e1e; padding: 20px; border-top: 2px solid #333; text-align: center; }
        #result { font-size: 4rem; font-weight: bold; color: var(--neon); text-shadow: 0 0 10px rgba(0,255,0,0.5); margin: 10px 0; min-height: 5rem; }
        
        button {
            width: 100%; padding: 20px; font-size: 1.2rem; font-weight: bold;
            background: var(--neon); color: black; border: none; border-radius: 12px;
            cursor: pointer; transition: 0.2s;
        }
        button:active { transform: scale(0.98); opacity: 0.8; }
        button:disabled { background: #444; color: #888; }

        .info { font-size: 0.8rem; color: #888; margin-top: 10px; }
        canvas { display: none; } /* On cache les canvas de calcul */
    </style>
</head>
<body>

    <div id="cam-container">
        <video id="webcam" autoplay playsinline></video>
        <div class="visor"></div>
    </div>

    <div class="ui">
        <div id="result">--</div>
        <button id="btn-scan">SCANNER MAINTENANT</button>
        <div id="status" class="info">Prêt pour détection 7-segments</div>
    </div>

    <canvas id="c-proc"></canvas>

    <script>
        class BalanceScanner {
            constructor() {
                this.video = document.getElementById('webcam');
                this.btn = document.getElementById('btn-scan');
                this.res = document.getElementById('result');
                this.status = document.getElementById('status');
                this.canvas = document.getElementById('c-proc');
                
                this.btn.onclick = () => this.scan();
                this.init();
            }

            async init() {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({
                        video: { facingMode: 'environment', width: 1280, height: 720 }
                    });
                    this.video.srcObject = stream;
                } catch (e) {
                    this.status.innerText = "Erreur caméra : Vérifiez HTTPS";
                }
            }

            // Nettoyage spécifique pour écran LED/LCD
            preprocess(ctx, w, h) {
                const img = ctx.getImageData(0, 0, w, h);
                const d = img.data;
                for (let i = 0; i < d.length; i += 4) {
                    // Gris pondéré
                    let g = d[i] * 0.3 + d[i+1] * 0.59 + d[i+2] * 0.11;
                    // Contraste extrême (Seuil à 130)
                    let v = (g > 130) ? 255 : 0; 
                    // Inversion pour Tesseract (doit être noir sur blanc)
                    d[i] = d[i+1] = d[i+2] = (v === 255) ? 0 : 255;
                }
                ctx.putImageData(img, 0, 0);
            }

            async scan() {
                this.btn.disabled = true;
                this.res.innerText = "...";
                this.res.style.color = "#888";

                const vW = this.video.videoWidth;
                const vH = this.video.videoHeight;
                
                // Zone du viseur
                const rw = vW * 0.8, rh = vH * 0.25;
                const rx = (vW - rw) / 2, ry = (vH - rh) / 2;

                this.canvas.width = rw;
                this.canvas.height = rh;
                const ctx = this.canvas.getContext('2d', {willReadFrequently: true});
                
                // 1. Capture & Nettoyage
                ctx.drawImage(this.video, rx, ry, rw, rh, 0, 0, rw, rh);
                this.preprocess(ctx, rw, rh);

                // 2. Segmentation des colonnes
                const img = ctx.getImageData(0, 0, rw, rh);
                const d = img.data;
                let cols = new Array(rw).fill(0);
                
                for (let x = 0; x < rw; x++) {
                    for (let y = 0; y < rh; y++) {
                        if (d[(y * rw + x) * 4] === 0) cols[x]++; // Compte les pixels noirs
                    }
                }

                // 3. Extraction des chiffres
                let digits = [];
                let inDigit = false, start = 0;
                for (let i = 0; i < cols.length; i++) {
                    if (cols[i] > 3 && !inDigit) { inDigit = true; start = i; }
                    else if (cols[i] <= 3 && inDigit) {
                        inDigit = false;
                        if (i - start > 5) { // Éviter les parasites trop fins
                            digits.push({x: start, w: i - start});
                        }
                    }
                }

                this.status.innerText = `Détecté : ${digits.length} chiffres`;

                // 4. OCR Individuel
                let finalStr = "";
                for (let box of digits) {
                    const dCanvas = document.createElement('canvas');
                    // On ajoute une marge et on force une taille minimum (Tesseract aime le 60x60 min)
                    dCanvas.width = box.w + 20;
                    dCanvas.height = rh + 20;
                    const dCtx = dCanvas.getContext('2d');
                    dCtx.fillStyle = "white";
                    dCtx.fillRect(0,0, dCanvas.width, dCanvas.height);
                    dCtx.drawImage(this.canvas, box.x, 0, box.w, rh, 10, 10, box.w, rh);

                    try {
                        const { data: { text } } = await Tesseract.recognize(dCanvas, 'eng', {
                            tessedit_char_whitelist: '0123456789',
                            tessedit_pageseg_mode: '10' // SINGLE_CHAR
                        });
                        finalStr += text.trim();
                    } catch(e) {}
                }

                // 5. Affichage
                this.res.innerText = finalStr || "ERREUR";
                this.res.style.color = finalStr ? "var(--neon)" : "red";
                this.btn.disabled = false;
            }
        }

        window.onload = () => new BalanceScanner();
    </script>
</body>
</html>
