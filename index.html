<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner Balance Ultra</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: monospace; overflow: hidden; text-align: center; }
        video { width: 100%; height: 50vh; object-fit: cover; border-bottom: 2px solid #333; }
        .visor {
            position: absolute; top: 15vh; left: 10%; width: 80%; height: 20vh;
            border: 2px solid #0f0; box-shadow: 0 0 15px #0f0; pointer-events: none;
        }
        .controls { padding: 20px; }
        #weight { font-size: 5rem; color: #0f0; margin: 10px 0; font-weight: bold; }
        canvas { width: 90%; height: auto; border: 1px solid #444; margin-top: 10px; image-rendering: pixelated; }
        #status { color: #888; font-size: 12px; }
    </style>
</head>
<body>

    <video id="v" autoplay playsinline></video>
    <div class="visor"></div>

    <div class="controls">
        <div id="status">RECHERCHE DE SIGNAL...</div>
        <div id="weight">----</div>
        <canvas id="debug"></canvas>
        <p>Ajustez la distance pour que les chiffres remplissent le cadre</p>
    </div>

    <script>
        const v = document.getElementById('v');
        const canvas = document.getElementById('debug');
        const weightDisp = document.getElementById('weight');
        const statusDisp = document.getElementById('status');
        const ctx = canvas.getContext('2d', {alpha: false});

        navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
            .then(s => v.srcObject = s);

        async function process() {
            if (v.videoWidth === 0) return requestAnimationFrame(process);

            // 1. Capture & Nettoyage Extrême
            const w = 300; const h = 100;
            canvas.width = w; canvas.height = h;
            
            // On zoom sur le centre
            ctx.drawImage(v, v.videoWidth*0.15, v.videoHeight*0.4, v.videoWidth*0.7, v.videoHeight*0.2, 0, 0, w, h);
            
            let imgData = ctx.getImageData(0, 0, w, h);
            let d = imgData.data;

            // Seuil adaptatif simplifié (Otsu)
            let total = 0;
            for(let i=0; i<d.length; i+=4) total += (d[i]+d[i+1]+d[i+2])/3;
            let avg = total / (d.length/4);

            for(let i=0; i<d.length; i+=4) {
                let b = (d[i]+d[i+1]+d[i+2])/3;
                let val = (b > avg + 20) ? 255 : 0; // On isole les segments brillants
                // Inversion pour l'OCR : Fond blanc, Segments NOIRS
                d[i] = d[i+1] = d[i+2] = (val === 255) ? 0 : 255;
            }
            ctx.putImageData(imgData, 0, 0);

            // 2. Tentative OCR avec Tesseract optimisé "Caractère par Caractère"
            try {
                const result = await Tesseract.recognize(canvas, 'eng', {
                    tessedit_char_whitelist: '0123456789.,',
                    tessedit_pageseg_mode: '7', // Traite l'image comme une seule ligne de texte
                    tessedit_ocr_engine_mode: '1' // Mode LSTM uniquement
                });

                let txt = result.data.text.replace(/[^0-9]/g, "");
                
                if (txt.length > 0) {
                    weightDisp.innerText = txt;
                    statusDisp.innerText = "LECTURE EN COURS";
                    statusDisp.style.color = "#0f0";
                } else {
                    statusDisp.innerText = "SANS CHIFFRE - RAPPROCHEZ-VOUS";
                    statusDisp.style.color = "#f00";
                }
            } catch(e) { console.error(e); }

            setTimeout(process, 300); // Boucle toutes les 300ms
        }

        v.onplay = () => process();
    </script>
</body>
</html>
