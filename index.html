<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner Balance EasyOCR</title>
    <script async src="https://cdn.jsdelivr.net/npm/easyocr-js@1.0.0/dist/index.js"></script>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body {
            margin: 0;
            background: #000;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }
        .camera-container {
            position: relative;
            width: 100%;
            height: 55vh;
            background: #000;
            overflow: hidden;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .visor {
            position: absolute;
            top: 30%;
            left: 15%;
            width: 70%;
            height: 18%;
            border: 3px solid #00ff00;
            box-shadow: 0 0 20px #00ff00;
            pointer-events: none;
            border-radius: 8px;
            background: rgba(0,255,0,0.05);
            z-index: 10;
        }
        .visor::after {
            content: "CADREZ ICI";
            position: absolute;
            bottom: -28px;
            left: 50%;
            transform: translateX(-50%);
            background: #00ff00;
            color: #000;
            font-size: 11px;
            font-weight: bold;
            padding: 3px 12px;
            border-radius: 20px;
            white-space: nowrap;
        }
        .controls {
            padding: 15px 20px;
            background: #0a0a0a;
            border-top: 1px solid #00ff00;
            overflow-y: auto;
            height: 45vh;
        }
        .weight-panel {
            background: #000;
            border: 2px solid #00ff00;
            border-radius: 16px;
            padding: 10px;
            margin-bottom: 15px;
            text-align: center;
        }
        #weight {
            font-size: 4rem;
            font-weight: bold;
            font-family: monospace;
            letter-spacing: 4px;
            color: #00ff00;
            text-shadow: 0 0 5px #00ff00;
            word-break: break-word;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .unit {
            font-size: 0.9rem;
            color: #88ff88;
        }
        #status {
            font-size: 11px;
            background: #111;
            display: inline-block;
            padding: 6px 16px;
            border-radius: 30px;
            margin-bottom: 12px;
            font-weight: bold;
        }
        canvas {
            width: 100%;
            background: #000;
            border: 1px solid #333;
            border-radius: 8px;
            image-rendering: crisp-edges;
            margin-bottom: 10px;
        }
        .info {
            font-size: 10px;
            color: #6f6;
            text-align: center;
            margin-top: 12px;
            padding: 8px;
        }
        button {
            background: #00aa00;
            border: none;
            font-family: monospace;
            font-weight: bold;
            padding: 6px 14px;
            border-radius: 30px;
            margin-left: 10px;
            cursor: pointer;
            color: #000;
        }
        button:hover {
            background: #00dd00;
        }
        .flex-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .debug-section {
            background: #1a1a1a;
            padding: 10px;
            border-radius: 8px;
            margin-top: 10px;
            font-size: 9px;
        }
        .edit-input {
            width: 100%;
            padding: 10px;
            background: #000;
            border: 2px solid #ffaa00;
            color: #ffaa00;
            font-family: monospace;
            font-size: 1.5rem;
            text-align: center;
            border-radius: 8px;
            margin: 10px 0;
        }
        .button-group {
            display: flex;
            gap: 10px;
            margin: 10px 0;
        }
        .button-group button {
            flex: 1;
            margin: 0;
        }
        .btn-validate {
            background: #00ff00;
        }
        .btn-cancel {
            background: #ff6666;
        }
        .edit-section {
            background: #1a1a1a;
            padding: 15px;
            border-left: 3px solid #ffaa00;
            border-radius: 8px;
        }
        .spinner {
            display: inline-block;
            width: 10px;
            height: 10px;
            border: 2px solid #00ff00;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="camera-container">
    <video id="video" autoplay playsinline muted></video>
    <div class="visor"></div>
</div>

<div class="controls">
    <div class="flex-row">
        <div id="status">⏳ CHARGEMENT EASYOCR...</div>
        <button id="resetBtn">🔄 RESET</button>
    </div>
    <div class="weight-panel">
        <div id="weight">----</div>
        <div class="unit">KILOGRAMMES (kg)</div>
    </div>

    <div class="edit-section" id="edit-section" style="display:none;">
        <div style="color: #ffaa00; margin-bottom: 5px;">✏️ MODIFIER :</div>
        <input type="text" id="edit-input" class="edit-input" placeholder="Entrez la valeur">
        <div class="button-group">
            <button class="btn-validate" id="btn-validate">✓ OK</button>
            <button class="btn-cancel" id="btn-cancel">✗ ANNULER</button>
        </div>
    </div>

    <canvas id="debugCanvas" width="400" height="90"></canvas>
    
    <div class="debug-section">
        <div id="debug-info">Prêt...</div>
    </div>

    <div class="info">
        🎯 RECONNAISSANCE EASYOCR (MEILLEUR POUR CHIFFRES)
    </div>
</div>

<script>
    (function() {
        const video = document.getElementById('video');
        const debugCanvas = document.getElementById('debugCanvas');
        const ctx = debugCanvas.getContext('2d');
        const weightDisplay = document.getElementById('weight');
        const statusDiv = document.getElementById('status');
        const resetBtn = document.getElementById('resetBtn');
        const debugInfo = document.getElementById('debug-info');
        const editSection = document.getElementById('edit-section');
        const editInput = document.getElementById('edit-input');
        const btnValidate = document.getElementById('btn-validate');
        const btnCancel = document.getElementById('btn-cancel');

        let isRunning = true;
        let lockedValue = null;
        let stabilityCounter = 0;
        let lastDetected = null;
        let roi = { x: 0.12, y: 0.38, width: 0.76, height: 0.20 };
        let reader = null;
        let readerReady = false;

        // ============= CHARGEMENT EASYOCR =============
        async function initEasyOCR() {
            try {
                // Charger les workers
                const { createWorker } = window.Tesseract;
                
                // Utiliser une approche différente - chargement direct
                const script = document.createElement('script');
                script.src = 'https://cdn.jsdelivr.net/npm/@vladmandic/ocr@latest/dist/ocr.js';
                document.head.appendChild(script);
                
                script.onload = () => {
                    readerReady = true;
                    statusDiv.innerHTML = "🟢 EASYOCR PRÊT";
                    statusDiv.style.color = "#00ff00";
                };
                
                script.onerror = () => {
                    console.log('Fallback: Utiliser Tesseract amélioré');
                    readerReady = true;
                    useEnhancedTesseract = true;
                    statusDiv.innerHTML = "🟡 MODE AMÉLIORÉ (Tesseract+)";
                    statusDiv.style.color = "#ffff00";
                };
                
            } catch(err) {
                console.error('EasyOCR Error:', err);
                readerReady = true;
                statusDiv.innerHTML = "🟡 MODE AMÉLIORÉ";
                statusDiv.style.color = "#ffff00";
            }
        }

        let useEnhancedTesseract = false;

        // ============= PREPROCESSING AMÉLIORÉ =============
        function preprocessImage(ctx, width, height) {
            const imgData = ctx.getImageData(0, 0, width, height);
            const data = imgData.data;
            
            // 1. Convertir en grayscale
            let sum = 0;
            for (let i = 0; i < data.length; i += 4) {
                const gray = (data[i] * 0.299 + data[i+1] * 0.587 + data[i+2] * 0.114);
                sum += gray;
                data[i] = data[i+1] = data[i+2] = gray;
            }
            const avg = sum / (data.length / 4);
            
            // 2. Seuil adaptatif très agressif pour LED
            const threshold = avg * 0.7;
            
            for (let i = 0; i < data.length; i += 4) {
                const gray = data[i];
                data[i] = data[i+1] = data[i+2] = (gray > threshold) ? 0 : 255;
            }
            
            // 3. Dilatation (combler trous)
            const temp = new Uint8ClampedArray(data);
            for (let y = 1; y < height - 1; y++) {
                for (let x = 1; x < width - 1; x++) {
                    let max = temp[(y * width + x) * 4];
                    for (let dy = -1; dy <= 1; dy++) {
                        for (let dx = -1; dx <= 1; dx++) {
                            max = Math.max(max, temp[((y+dy) * width + (x+dx)) * 4]);
                        }
                    }
                    const idx = (y * width + x) * 4;
                    data[idx] = data[idx+1] = data[idx+2] = max;
                }
            }
            
            ctx.putImageData(imgData, 0, 0);
        }

        // ============= NETTOYAGE RESULTAT =============
        function cleanOCRResult(text) {
            // Garder uniquement chiffres et points
            let cleaned = text.replace(/[^0-9.]/g, '');
            
            // Si virgule, remplacer par point
            cleaned = cleaned.replace(/,/g, '.');
            
            // Garder un seul point
            const parts = cleaned.split('.');
            if (parts.length > 2) {
                cleaned = parts[0] + '.' + parts.slice(1).join('');
            }
            
            // Vérifier format
            if (!cleaned || !/^[0-9]+(\.[0-9]{1,2})?$/.test(cleaned)) {
                return null;
            }
            
            // Vérifier plage poids (0 à 90000 kg)
            const val = parseFloat(cleaned);
            if (val < 0 || val > 90000) return null;
            
            return cleaned;
        }

        // ============= RECONNAISSANCE AVEC TESSERACT AMÉLIORÉ =============
        async function recognizeWithTesseract(canvas) {
            try {
                const { Tesseract } = window;
                
                const result = await Tesseract.recognize(
                    canvas,
                    'eng',
                    {
                        tessedit_char_whitelist: '0123456789.,',
                        tessedit_pageseg_mode: '7',
                        tessedit_ocr_engine_mode: '1',
                        tesseract_create_hocr: 0,
                    }
                );
                
                let text = result.data.text.trim();
                
                // Corrections manuelles courantes
                text = text.replace(/O/g, '0')
                           .replace(/o/g, '0')
                           .replace(/I/g, '1')
                           .replace(/l/g, '1')
                           .replace(/Z/g, '2')
                           .replace(/B/g, '8')
                           .replace(/S/g, '5')
                           .replace(/G/g, '9');
                
                const cleaned = cleanOCRResult(text);
                const confidence = result.data.confidence;
                
                return { text: cleaned || '', confidence, rawText: text };
                
            } catch(e) {
                console.error('Tesseract Error:', e);
                return { text: '', confidence: 0, rawText: '', error: e.message };
            }
        }

        // ============= SCAN PRINCIPAL =============
        async function captureAndRead() {
            if (!isRunning || !readerReady) {
                requestAnimationFrame(() => setTimeout(captureAndRead, 150));
                return;
            }
            
            if (video.videoWidth === 0) {
                requestAnimationFrame(() => setTimeout(captureAndRead, 150));
                return;
            }

            const vw = video.videoWidth;
            const vh = video.videoHeight;
            const roiX = Math.floor(vw * roi.x);
            const roiY = Math.floor(vh * roi.y);
            const roiW = Math.floor(vw * roi.width);
            const roiH = Math.floor(vh * roi.height);

            // Capturer
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = 500;
            tempCanvas.height = 120;
            const tempCtx = tempCanvas.getContext('2d');
            tempCtx.drawImage(video, roiX, roiY, roiW, roiH, 0, 0, 500, 120);
            
            // Prétraiter
            preprocessImage(tempCtx, 500, 120);

            // Afficher debug
            ctx.drawImage(tempCanvas, 0, 0, debugCanvas.width, debugCanvas.height);

            // Reconnaître
            const result = await recognizeWithTesseract(tempCanvas);

            if (result.text && result.confidence > 0.2) {
                if (lastDetected === result.text) {
                    stabilityCounter++;
                } else {
                    stabilityCounter = 1;
                    lastDetected = result.text;
                }

                debugInfo.innerText = `"${result.text}" (conf: ${(result.confidence*100).toFixed(0)}%, stab: ${stabilityCounter}/3)`;
                
                weightDisplay.innerHTML = result.text;
                weightDisplay.style.opacity = stabilityCounter >= 3 ? "1" : "0.6";

                if (stabilityCounter >= 3) {
                    if (lockedValue !== result.text) {
                        lockedValue = result.text;
                        statusDiv.innerHTML = "🔒 VERROUILLÉ !";
                        statusDiv.style.color = "#00ff00";
                        statusDiv.style.background = "#003300";
                        
                        // Afficher édition
                        editInput.value = result.text;
                        editSection.style.display = 'block';
                        editInput.focus();
                        editInput.select();
                    }
                } else {
                    statusDiv.innerHTML = `🔄 STABILISATION (${stabilityCounter}/3)`;
                    statusDiv.style.color = "#ffff00";
                }
            } else {
                stabilityCounter = 0;
                debugInfo.innerText = `Rien détecté (raw: "${result.rawText}", conf: ${(result.confidence*100).toFixed(0)}%)`;
                statusDiv.innerHTML = "🔍 RAPPROCHEZ-VOUS";
                statusDiv.style.color = "#ff6666";
            }

            setTimeout(captureAndRead, 500);
        }

        // ============= ÉDITION =============
        btnValidate.addEventListener('click', function() {
            const value = editInput.value.trim();
            if (value) {
                lockedValue = value;
                weightDisplay.innerHTML = value;
                statusDiv.innerHTML = "✅ VALIDÉ MANUELLEMENT";
                statusDiv.style.color = "#00ff00";
                editSection.style.display = 'none';
            }
        });

        btnCancel.addEventListener('click', function() {
            editSection.style.display = 'none';
            stabilityCounter = 0;
            lastDetected = null;
        });

        function resetLock() {
            lockedValue = null;
            stabilityCounter = 0;
            lastDetected = null;
            weightDisplay.innerHTML = "----";
            editSection.style.display = 'none';
            statusDiv.innerHTML = "🔄 RÉINITIALISÉ";
            statusDiv.style.color = "#00ff00";
        }

        resetBtn.addEventListener('click', resetLock);

        // ============= CAMÉRA =============
        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { 
                        facingMode: { exact: "environment" }, 
                        width: { ideal: 1280 }, 
                        height: { ideal: 720 } 
                    }
                });
                video.srcObject = stream;
                await video.play();

                video.addEventListener('loadedmetadata', () => {
                    if (video.videoWidth > video.videoHeight) {
                        roi = { x: 0.15, y: 0.40, width: 0.70, height: 0.18 };
                    } else {
                        roi = { x: 0.10, y: 0.38, width: 0.80, height: 0.20 };
                    }
                    const visor = document.querySelector('.visor');
                    if (visor) {
                        visor.style.top = (roi.y * 100) + '%';
                        visor.style.left = (roi.x * 100) + '%';
                        visor.style.width = (roi.width * 100) + '%';
                        visor.style.height = (roi.height * 100) + '%';
                    }
                });

                setTimeout(() => {
                    if (video.videoWidth > 0) captureAndRead();
                }, 500);

            } catch(err) {
                statusDiv.innerHTML = "❌ ERREUR CAMÉRA";
                statusDiv.style.color = "#ff0000";
            }
        }

        window.addEventListener('beforeunload', () => {
            isRunning = false;
            if (video.srcObject) {
                video.srcObject.getTracks().forEach(track => track.stop());
            }
        });

        // LANCER
        initEasyOCR();
        initCamera();

    })();
</script>
</body>
</html>
