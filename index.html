<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner Balance 7-Segments</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body {
            margin: 0;
            background: #000;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }
        .camera-container {
            position: relative;
            width: 100%;
            height: 55vh;
            background: #000;
            overflow: hidden;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .visor {
            position: absolute;
            top: 30%;
            left: 15%;
            width: 70%;
            height: 18%;
            border: 3px solid #00ff00;
            box-shadow: 0 0 20px #00ff00;
            pointer-events: none;
            border-radius: 8px;
            background: rgba(0,255,0,0.05);
            z-index: 10;
        }
        .visor::after {
            content: "CADREZ ICI";
            position: absolute;
            bottom: -28px;
            left: 50%;
            transform: translateX(-50%);
            background: #00ff00;
            color: #000;
            font-size: 11px;
            font-weight: bold;
            padding: 3px 12px;
            border-radius: 20px;
            white-space: nowrap;
        }
        .controls {
            padding: 15px 20px;
            background: #0a0a0a;
            border-top: 1px solid #00ff00;
            overflow-y: auto;
            height: 45vh;
        }
        .weight-panel {
            background: #000;
            border: 2px solid #00ff00;
            border-radius: 16px;
            padding: 10px;
            margin-bottom: 15px;
            text-align: center;
        }
        #weight {
            font-size: 4rem;
            font-weight: bold;
            font-family: monospace;
            letter-spacing: 4px;
            color: #00ff00;
            text-shadow: 0 0 5px #00ff00;
            word-break: break-word;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .unit {
            font-size: 0.9rem;
            color: #88ff88;
        }
        #status {
            font-size: 11px;
            background: #111;
            display: inline-block;
            padding: 6px 16px;
            border-radius: 30px;
            margin-bottom: 12px;
            font-weight: bold;
        }
        canvas {
            width: 100%;
            background: #000;
            border: 1px solid #333;
            border-radius: 8px;
            image-rendering: crisp-edges;
            margin-bottom: 10px;
        }
        .info {
            font-size: 10px;
            color: #6f6;
            text-align: center;
            margin-top: 12px;
            padding: 8px;
        }
        button {
            background: #00aa00;
            border: none;
            font-family: monospace;
            font-weight: bold;
            padding: 6px 14px;
            border-radius: 30px;
            margin-left: 10px;
            cursor: pointer;
            color: #000;
        }
        button:hover {
            background: #00dd00;
        }
        .flex-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .debug-section {
            background: #1a1a1a;
            padding: 10px;
            border-radius: 8px;
            margin-top: 10px;
            font-size: 9px;
        }
        .edit-input {
            width: 100%;
            padding: 10px;
            background: #000;
            border: 2px solid #ffaa00;
            color: #ffaa00;
            font-family: monospace;
            font-size: 1.5rem;
            text-align: center;
            border-radius: 8px;
            margin: 10px 0;
        }
        .button-group {
            display: flex;
            gap: 10px;
            margin: 10px 0;
        }
        .button-group button {
            flex: 1;
            margin: 0;
        }
        .btn-validate {
            background: #00ff00;
        }
        .btn-cancel {
            background: #ff6666;
        }
    </style>
</head>
<body>

<div class="camera-container">
    <video id="video" autoplay playsinline muted></video>
    <div class="visor"></div>
</div>

<div class="controls">
    <div class="flex-row">
        <div id="status">🔴 DÉMARRAGE...</div>
        <button id="resetBtn">🔄 RESET</button>
    </div>
    <div class="weight-panel">
        <div id="weight">----</div>
        <div class="unit">KILOGRAMMES (kg)</div>
    </div>

    <div class="edit-section" id="edit-section" style="display:none;">
        <div style="color: #ffaa00; margin-bottom: 5px;">✏️ MODIFIER :</div>
        <input type="text" id="edit-input" class="edit-input" placeholder="Entrez la valeur">
        <div class="button-group">
            <button class="btn-validate" id="btn-validate">✓ OK</button>
            <button class="btn-cancel" id="btn-cancel">✗ ANNULER</button>
        </div>
    </div>

    <canvas id="debugCanvas" width="400" height="90" style="width:100%; height:auto;"></canvas>
    
    <div class="debug-section">
        <div id="debug-info">Détection: --</div>
    </div>

    <div class="info">
        🎯 DÉTECTION AUTOMATIQUE 7-SEGMENTS (SANS OCR)
    </div>
</div>

<script>
    (function() {
        const video = document.getElementById('video');
        const debugCanvas = document.getElementById('debugCanvas');
        const ctx = debugCanvas.getContext('2d');
        const weightDisplay = document.getElementById('weight');
        const statusDiv = document.getElementById('status');
        const resetBtn = document.getElementById('resetBtn');
        const debugInfo = document.getElementById('debug-info');
        const editSection = document.getElementById('edit-section');
        const editInput = document.getElementById('edit-input');
        const btnValidate = document.getElementById('btn-validate');
        const btnCancel = document.getElementById('btn-cancel');

        let isRunning = true;
        let lockedValue = null;
        let stabilityCounter = 0;
        let lastDetected = null;
        let roi = { x: 0.12, y: 0.38, width: 0.76, height: 0.20 };

        // ============= PATTERNS 7-SEGMENTS =============
        // Chaque chiffre = 7 segments (top, top-left, top-right, middle, bot-left, bot-right, bottom)
        const PATTERNS = {
            '0': [1,1,1,0,1,1,1],
            '1': [0,0,1,0,0,1,0],
            '2': [1,0,1,1,1,0,1],
            '3': [1,0,1,1,0,1,1],
            '4': [0,1,1,1,0,1,0],
            '5': [1,1,0,1,0,1,1],
            '6': [1,1,0,1,1,1,1],
            '7': [1,0,1,0,0,1,0],
            '8': [1,1,1,1,1,1,1],
            '9': [1,1,1,1,0,1,1],
            '.': [0,0,0,0,0,0,1],
        };

        // ============= PRÉTRAITEMENT =============
        function preprocessImage(ctx, width, height) {
            const imgData = ctx.getImageData(0, 0, width, height);
            const data = imgData.data;
            
            // Grayscale et calcul moyenne
            let sum = 0;
            for (let i = 0; i < data.length; i += 4) {
                const gray = (data[i] * 0.299 + data[i+1] * 0.587 + data[i+2] * 0.114);
                sum += gray;
            }
            const avg = sum / (data.length / 4);
            
            // Seuil adaptatif pour LED lumineux
            const threshold = avg * 0.85;
            
            // Binarisation
            for (let i = 0; i < data.length; i += 4) {
                const gray = (data[i] * 0.299 + data[i+1] * 0.587 + data[i+2] * 0.114);
                const value = (gray > threshold) ? 0 : 255;
                data[i] = value;
                data[i+1] = value;
                data[i+2] = value;
            }
            
            ctx.putImageData(imgData, 0, 0);
        }

        // ============= DÉTECTION 7-SEGMENTS =============
        function detectSegments(imageData, digitX, digitY, digitW, digitH) {
            const data = imageData.data;
            const w = imageData.width;
            
            // Définir les 7 zones de segments (en pourcentage du chiffre)
            const segmentZones = {
                top: { x: 0.2, y: 0.05, w: 0.6, h: 0.15 },
                topLeft: { x: 0.05, y: 0.2, w: 0.2, h: 0.25 },
                topRight: { x: 0.75, y: 0.2, w: 0.2, h: 0.25 },
                middle: { x: 0.15, y: 0.45, w: 0.7, h: 0.1 },
                botLeft: { x: 0.05, y: 0.6, w: 0.2, h: 0.25 },
                botRight: { x: 0.75, y: 0.6, w: 0.2, h: 0.25 },
                bottom: { x: 0.2, y: 0.8, w: 0.6, h: 0.15 },
            };

            const segments = {};
            for (const [name, zone] of Object.entries(segmentZones)) {
                const x1 = Math.floor(digitX + zone.x * digitW);
                const y1 = Math.floor(digitY + zone.y * digitH);
                const x2 = Math.floor(digitX + (zone.x + zone.w) * digitW);
                const y2 = Math.floor(digitY + (zone.y + zone.h) * digitH);

                let darkPixels = 0;
                let totalPixels = 0;

                for (let y = y1; y < y2 && y < imageData.height; y++) {
                    for (let x = x1; x < x2 && x < w; x++) {
                        const idx = (y * w + x) * 4;
                        if (data[idx] < 128) darkPixels++;
                        totalPixels++;
                    }
                }

                segments[name] = (darkPixels / totalPixels) > 0.3 ? 1 : 0;
            }

            return [segments.top, segments.topLeft, segments.topRight, segments.middle, 
                    segments.botLeft, segments.botRight, segments.bottom];
        }

        // ============= RECONNAISSANCE CHIFFRE =============
        function recognizeDigit(pattern) {
            let bestMatch = '?';
            let bestScore = 0;

            for (const [digit, digitPattern] of Object.entries(PATTERNS)) {
                let score = 0;
                for (let i = 0; i < 7; i++) {
                    if (pattern[i] === digitPattern[i]) score++;
                }
                
                if (score > bestScore) {
                    bestScore = score;
                    bestMatch = digit;
                }
            }

            return { digit: bestMatch, confidence: bestScore / 7 };
        }

        // ============= DÉTECTION NOMBRE COMPLET =============
        async function captureAndRead() {
            if (!isRunning) return;
            if (video.videoWidth === 0) {
                requestAnimationFrame(() => setTimeout(captureAndRead, 150));
                return;
            }

            const vw = video.videoWidth;
            const vh = video.videoHeight;
            const roiX = Math.floor(vw * roi.x);
            const roiY = Math.floor(vh * roi.y);
            const roiW = Math.floor(vw * roi.width);
            const roiH = Math.floor(vh * roi.height);

            // Capturer et prétraiter
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = 400;
            tempCanvas.height = 90;
            const tempCtx = tempCanvas.getContext('2d');
            tempCtx.drawImage(video, roiX, roiY, roiW, roiH, 0, 0, 400, 90);
            
            preprocessImage(tempCtx, 400, 90);

            // Afficher dans debug
            ctx.drawImage(tempCanvas, 0, 0, debugCanvas.width, debugCanvas.height);

            // Détection des segments
            const imageData = tempCtx.getImageData(0, 0, 400, 90);
            
            // Diviser en zones pour chiffres individuels (estimation simple)
            const digitWidth = 400 / 6; // Jusqu'à 6 chiffres
            let detectedNumber = '';
            let confidenceSum = 0;
            let digitCount = 0;

            for (let i = 0; i < 6; i++) {
                const digitX = i * digitWidth;
                const digitY = 0;
                
                const pattern = detectSegments(imageData, digitX, digitY, digitWidth, 90);
                const result = recognizeDigit(pattern);
                
                if (result.confidence > 0.4) {
                    detectedNumber += result.digit;
                    confidenceSum += result.confidence;
                    digitCount++;
                }
            }

            // ============= GESTION VERROUILLAGE =============
            if (detectedNumber && detectedNumber.replace(/\./g, '').length > 0) {
                const cleanNumber = detectedNumber.replace(/[^0-9.]/g, '');
                
                if (cleanNumber && /^[0-9]+(\.[0-9]{1,2})?$/.test(cleanNumber)) {
                    if (lastDetected === cleanNumber) {
                        stabilityCounter++;
                    } else {
                        stabilityCounter = 1;
                        lastDetected = cleanNumber;
                    }

                    const avgConf = digitCount > 0 ? (confidenceSum / digitCount * 100).toFixed(0) : 0;
                    debugInfo.innerText = `Détecté: ${cleanNumber} (conf: ${avgConf}%, stabilité: ${stabilityCounter}/3)`;
                    
                    weightDisplay.innerHTML = cleanNumber;
                    weightDisplay.style.opacity = stabilityCounter >= 3 ? "1" : "0.6";

                    if (stabilityCounter >= 3) {
                        if (lockedValue !== cleanNumber) {
                            lockedValue = cleanNumber;
                            statusDiv.innerHTML = "🔒 VERROUILLÉ !";
                            statusDiv.style.color = "#00ff00";
                            statusDiv.style.background = "#003300";
                            
                            // Afficher champ édition
                            editInput.value = cleanNumber;
                            editSection.style.display = 'block';
                            editInput.focus();
                            editInput.select();
                        }
                    } else {
                        statusDiv.innerHTML = `🔄 STABILISATION (${stabilityCounter}/3)`;
                        statusDiv.style.color = "#ffff00";
                    }
                } else {
                    stabilityCounter = 0;
                    debugInfo.innerText = `Invalide: ${detectedNumber}`;
                }
            } else {
                stabilityCounter = 0;
                debugInfo.innerText = 'Aucun chiffre détecté';
                statusDiv.innerHTML = "🔍 RAPPROCHEZ-VOUS";
                statusDiv.style.color = "#ff6666";
            }

            setTimeout(captureAndRead, 400);
        }

        // ============= ÉDITION =============
        btnValidate.addEventListener('click', function() {
            const value = editInput.value.trim();
            if (value) {
                lockedValue = value;
                weightDisplay.innerHTML = value;
                statusDiv.innerHTML = "✅ VALIDÉ MANUELLEMENT";
                statusDiv.style.color = "#00ff00";
                editSection.style.display = 'none';
            }
        });

        btnCancel.addEventListener('click', function() {
            editSection.style.display = 'none';
            stabilityCounter = 0;
            lastDetected = null;
        });

        function resetLock() {
            lockedValue = null;
            stabilityCounter = 0;
            lastDetected = null;
            weightDisplay.innerHTML = "----";
            editSection.style.display = 'none';
            statusDiv.innerHTML = "🔄 RÉINITIALIÉ";
            statusDiv.style.color = "#00ff00";
        }

        resetBtn.addEventListener('click', resetLock);

        // ============= CAMÉRA =============
        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: { exact: "environment" }, width: { ideal: 1280 }, height: { ideal: 720 } }
                });
                video.srcObject = stream;
                await video.play();
                
                statusDiv.innerHTML = "🟢 PRÊT";
                statusDiv.style.color = "#00ff00";

                video.addEventListener('loadedmetadata', () => {
                    if (video.videoWidth > video.videoHeight) {
                        roi = { x: 0.15, y: 0.40, width: 0.70, height: 0.18 };
                    } else {
                        roi = { x: 0.10, y: 0.38, width: 0.80, height: 0.20 };
                    }
                    const visor = document.querySelector('.visor');
                    if (visor) {
                        visor.style.top = (roi.y * 100) + '%';
                        visor.style.left = (roi.x * 100) + '%';
                        visor.style.width = (roi.width * 100) + '%';
                        visor.style.height = (roi.height * 100) + '%';
                    }
                });

                setTimeout(() => {
                    if (video.videoWidth > 0) captureAndRead();
                }, 500);

            } catch(err) {
                statusDiv.innerHTML = "❌ ERREUR CAMÉRA";
                statusDiv.style.color = "#ff0000";
            }
        }

        window.addEventListener('beforeunload', () => {
            isRunning = false;
            if (video.srcObject) {
                video.srcObject.getTracks().forEach(track => track.stop());
            }
        });

        initCamera();

    })();
</script>
</body>
</html>
