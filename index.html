<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Scanner Balance PRO++</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>
body { margin:0; background:#000; color:#fff; font-family:monospace; }
#video { width:100%; height:50vh; }
#weight { font-size:4rem; text-align:center; margin:20px; }
.roi { position:absolute; border:3px solid red; top:30%; left:20%; width:60%; height:15%; }
button { padding:15px; font-size:16px; }
</style>
</head>

<body>

<div style="position:relative">
<video id="video" autoplay playsinline></video>
<div class="roi"></div>
</div>

<div id="weight">----</div>
<button onclick="startScan()">SCAN AUTO</button>

<canvas id="canvas" width="400" height="120"></canvas>

<script>

const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const weight = document.getElementById('weight');

navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
.then(stream => video.srcObject = stream);

// =======================
// PREPROCESSING PRO
// =======================
function preprocess(imgData) {
    const d = imgData.data;

    // grayscale + contrast
    for (let i = 0; i < d.length; i += 4) {
        const gray = 0.3*d[i] + 0.59*d[i+1] + 0.11*d[i+2];

        // contraste boost
        let val = gray > 120 ? 255 : 0;

        d[i] = d[i+1] = d[i+2] = val;
    }

    return imgData;
}

// =======================
// UPSCALE
// =======================
function upscale(source) {
    const big = document.createElement('canvas');
    big.width = source.width * 3;
    big.height = source.height * 3;

    const bctx = big.getContext('2d');
    bctx.imageSmoothingEnabled = false;
    bctx.drawImage(source, 0, 0, big.width, big.height);

    return big;
}

// =======================
// OCR
// =======================
async function read(canvas) {
    const res = await Tesseract.recognize(canvas, 'eng', {
        tessedit_char_whitelist: '0123456789',
        tessedit_pageseg_mode: 7
    });

    return res.data.text.replace(/\D/g, '');
}

// =======================
// STABILISATION
// =======================
let history = [];

function stabilize(value) {
    if (!value) return null;

    history.push(value);
    if (history.length > 5) history.shift();

    const counts = {};
    history.forEach(v => counts[v] = (counts[v]||0)+1);

    let best = null, max = 0;
    for (let k in counts) {
        if (counts[k] > max) {
            best = k;
            max = counts[k];
        }
    }

    return max >= 3 ? best : null;
}

// =======================
// SCAN LOOP
// =======================
let scanning = false;

async function startScan() {
    scanning = true;

    while (scanning) {
        await scanOnce();
        await new Promise(r => setTimeout(r, 300)); // vitesse scan
    }
}

async function scanOnce() {

    const vw = video.videoWidth;
    const vh = video.videoHeight;

    const x = vw * 0.2;
    const y = vh * 0.3;
    const w = vw * 0.6;
    const h = vh * 0.15;

    ctx.drawImage(video, x, y, w, h, 0, 0, 400, 120);

    let imgData = ctx.getImageData(0, 0, 400, 120);
    imgData = preprocess(imgData);
    ctx.putImageData(imgData, 0, 0);

    const big = upscale(canvas);

    const text = await read(big);

    const stable = stabilize(text);

    if (stable) {
        weight.innerText = stable;
        weight.style.color = "lime";
    } else {
        weight.innerText = text || "----";
        weight.style.color = "orange";
    }
}

</script>

</body>
</html>
