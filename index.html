<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lecteur de Balance</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        :root {
            --primary: #2563eb;
            --success: #16a34a;
            --bg: #f3f4f6;
        }

        body {
            margin: 0;
            font-family: sans-serif;
            background-color: var(--bg);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Zone Caméra */
        #camera-container {
            position: relative;
            flex: 1;
            background: #000;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Rectangle de visée */
        .overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85%;
            height: 40%;
            border: 4px solid #00ff00;
            border-radius: 12px;
            box-shadow: 0 0 0 1000px rgba(0,0,0,0.5);
            pointer-events: none;
        }

        /* Zone de contrôle */
        .ui-panel {
            background: white;
            padding: 20px;
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.1);
            text-align: center;
        }

        .result-display {
            font-size: 3rem;
            font-weight: bold;
            font-family: monospace;
            color: #1f2937;
            margin-bottom: 15px;
            min-height: 4.5rem;
        }

        button {
            width: 100%;
            padding: 18px;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            background-color: var(--primary);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:active { opacity: 0.8; }
        button:disabled { background-color: #9ca3af; }

        .status-msg {
            font-size: 0.9rem;
            color: #6b7280;
            margin-top: 10px;
        }

        canvas { display: none; }
    </style>
</head>
<body>

    <div id="camera-container">
        <video id="webcam" autoplay playsinline></video>
        <div class="overlay"></div>
    </div>

    <div class="ui-panel">
        <div id="result" class="result-display">-- kg</div>
        <button id="scan-btn">LIRE LE POIDS</button>
        <div id="status" class="status-msg">Prêt à scanner</div>
    </div>

    <canvas id="proc-canvas"></canvas>

    <script>
        const video = document.getElementById('webcam');
        const scanBtn = document.getElementById('scan-btn');
        const resultDiv = document.getElementById('result');
        const statusDiv = document.getElementById('status');
        const canvas = document.getElementById('proc-canvas');

        // Initialisation Caméra
        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment', width: { ideal: 1280 } }
                });
                video.srcObject = stream;
            } catch (err) {
                statusDiv.innerText = "Erreur caméra : Vérifiez HTTPS";
                statusDiv.style.color = "red";
            }
        }

        // Prétraitement de l'image pour Tesseract
        function preprocessImage(ctx, w, h) {
            const imageData = ctx.getImageData(0, 0, w, h);
            const data = imageData.data;

            for (let i = 0; i < data.length; i += 4) {
                // Conversion Gris + Contraste violent
                const avg = (data[i] + data[i+1] + data[i+2]) / 3;
                
                // Si pixel clair (le chiffre LED), on le met en NOIR (car Tesseract lit noir sur blanc)
                // Si pixel sombre, on le met en BLANC
                const val = (avg > 140) ? 0 : 255; 
                
                data[i] = data[i+1] = data[i+2] = val;
            }
            ctx.putImageData(imageData, 0, 0);
        }

        async function performOCR() {
            scanBtn.disabled = true;
            statusDiv.innerText = "Traitement...";
            resultDiv.style.color = "#9ca3af";

            // 1. Définir la zone de capture (correspond au rectangle vert)
            const vW = video.videoWidth;
            const vH = video.videoHeight;
            const cropW = vW * 0.85;
            const cropH = vH * 0.40;
            const cropX = (vW - cropW) / 2;
            const cropY = (vH - cropH) / 2;

            canvas.width = cropW;
            canvas.height = cropH;
            const ctx = canvas.getContext('2d');

            // 2. Capture
            ctx.drawImage(video, cropX, cropY, cropW, cropH, 0, 0, cropW, cropH);
            
            // 3. Nettoyage
            preprocessImage(ctx, cropW, cropH);

            try {
                // 4. Lecture IA
                const { data: { text, confidence } } = await Tesseract.recognize(canvas, 'eng', {
                    tessedit_char_whitelist: '0123456789.,',
                    tessedit_pageseg_mode: '7'
                });

                // Nettoyage du texte (uniquement chiffres et point)
                const cleanText = text.replace(/[^0-9.,]/g, "").trim();

                if (cleanText && confidence > 25) {
                    resultDiv.innerText = cleanText + " kg";
                    resultDiv.style.color = "var(--success)";
                    statusDiv.innerText = "Lecture réussie (" + Math.round(confidence) + "%)";
                } else {
                    resultDiv.innerText = "Réessayer";
                    statusDiv.innerText = "Impossible de lire nettement";
                }
            } catch (e) {
                statusDiv.innerText = "Erreur OCR";
            } finally {
                scanBtn.disabled = false;
            }
        }

        scanBtn.addEventListener('click', performOCR);
        window.addEventListener('load', initCamera);
    </script>
</body>
</html>
