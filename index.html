<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner Industriel - Validation</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        :root { --neon: #00ff00; --danger: #ff4444; }
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; }
        
        /* Caméra et Viseur */
        #cam-box { position: relative; height: 45vh; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .visor { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 70%; height: 25%; border: 2px solid var(--neon);
            box-shadow: 0 0 0 1000px rgba(0,0,0,0.7); z-index: 2;
        }

        /* Zone de lecture en temps réel */
        .live-preview { background: #111; padding: 10px; text-align: center; border-bottom: 1px solid #333; }
        #live-weight { font-size: 1.5rem; color: #888; font-family: monospace; }
        canvas { display: block; margin: 5px auto; height: 50px; border: 1px solid #444; }

        /* Chiffre Final Bloqué */
        .result-panel { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        #final-weight { 
            font-size: 5rem; font-weight: bold; color: var(--neon); 
            background: transparent; border: none; text-align: center; width: 100%;
            font-family: 'Courier New', monospace;
        }
        
        /* Boutons */
        .btn-group { width: 100%; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        button { padding: 20px; border: none; border-radius: 12px; font-weight: bold; font-size: 1.1rem; cursor: pointer; }
        .btn-scan { background: var(--neon); color: #000; grid-column: span 2; }
        .btn-reset { background: #333; color: #fff; }
        .btn-save { background: #0055ff; color: #fff; }
    </style>
</head>
<body>

    <div id="cam-box">
        <video id="v" autoplay playsinline></video>
        <div class="visor"></div>
    </div>

    <div class="live-preview">
        <div id="live-weight">DÉTECTION...</div>
        <canvas id="debug"></canvas>
    </div>

    <div class="result-panel">
        <label style="font-size: 0.8rem; color: #888;">POIDS VALIDÉ (Modifiable) :</label>
        <input type="text" id="final-weight" value="0.00" inputmode="decimal">
        
        <div class="btn-group">
            <button class="btn-scan" id="lock-btn">VALIDER CETTE LECTURE</button>
            <button class="btn-reset" onclick="location.reload()">REFAIRE</button>
            <button class="btn-save" onclick="alert('Enregistré : ' + document.getElementById('final-weight').value)">ENREGISTRER</button>
        </div>
    </div>

    <script>
        const v = document.getElementById('v');
        const canvas = document.getElementById('debug');
        const liveWeight = document.getElementById('live-weight');
        const finalWeightInput = document.getElementById('final-weight');
        const lockBtn = document.getElementById('lock-btn');
        const ctx = canvas.getContext('2d', {alpha: false});

        let currentDetection = "";

        // Lancer la caméra
        navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
            .then(s => v.srcObject = s);

        // Boucle de traitement
        async function analyze() {
            if (v.videoWidth === 0) return requestAnimationFrame(analyze);

            canvas.width = 200; canvas.height = 60;
            // Capture serrée sur les chiffres
            ctx.drawImage(v, v.videoWidth*0.2, v.videoHeight*0.4, v.videoWidth*0.6, v.videoHeight*0.2, 0, 0, 200, 60);
            
            // Filtre Noir & Blanc
            let imgData = ctx.getImageData(0, 0, 200, 60);
            let d = imgData.data;
            for(let i=0; i<d.length; i+=4) {
                let gray = (d[i]+d[i+1]+d[i+2])/3;
                let val = (gray > 120) ? 0 : 255; // Seuil
                d[i]=d[i+1]=d[i+2]=val;
            }
            ctx.putImageData(imgData, 0, 0);

            // OCR Rapide
            try {
                const { data: { text } } = await Tesseract.recognize(canvas, 'eng', {
                    tessedit_char_whitelist: '0123456789.',
                    tessedit_pageseg_mode: '7'
                });
                let clean = text.replace(/[^0-9.]/g, "");
                if (clean) {
                    currentDetection = clean;
                    liveWeight.innerText = "VU : " + clean + " kg";
                    liveWeight.style.color = "#0f0";
                }
            } catch(e) {}

            requestAnimationFrame(analyze);
        }

        // Action : Bloquer le chiffre
        lockBtn.onclick = () => {
            if (currentDetection) {
                finalWeightInput.value = currentDetection;
                // Animation de confirmation
                finalWeightInput.style.backgroundColor = "rgba(0,255,0,0.2)";
                setTimeout(() => finalWeightInput.style.backgroundColor = "transparent", 500);
            }
        };

        v.onplay = () => analyze();
    </script>
</body>
</html>
