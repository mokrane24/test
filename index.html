<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Pro 100% Chiffres</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #000; color: white; text-align: center; margin: 0; overflow: hidden; }
        #video { width: 100vw; height: 100vh; object-fit: cover; position: fixed; top: 0; left: 0; }
        
        /* Guide visuel */
        #guide {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 250px; height: 80px;
            border: 3px solid #00ff00; border-radius: 10px;
            box-shadow: 0 0 0 1000px rgba(0,0,0,0.6); z-index: 10;
        }

        #ui { position: fixed; bottom: 30px; width: 100%; z-index: 20; }
        button { 
            padding: 20px 40px; font-size: 1.2rem; font-weight: bold;
            background: #00ff00; color: #000; border: none; border-radius: 50px; 
            box-shadow: 0 4px 15px rgba(0,255,0,0.4);
        }
        
        #result-display {
            position: fixed; top: 40px; width: 100%; z-index: 20;
            font-size: 3rem; font-weight: bold; color: #00ff00;
            text-shadow: 2px 2px 10px rgba(0,0,0,1);
        }

        canvas { display: none; }
    </style>
</head>
<body>

    <div id="result-display">PRÊT</div>
    
    <video id="video" autoplay playsinline></video>
    <div id="guide"></div>

    <div id="ui">
        <button id="scanBtn">LIRE LES CHIFFRES</button>
    </div>

    <canvas id="cropCanvas"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('cropCanvas');
        const resultDisplay = document.getElementById('result-display');
        const btn = document.getElementById('scanBtn');

        // 1. Lancer la caméra avec la meilleure résolution possible
        navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } } 
        }).then(stream => { video.srcObject = stream; });

        // 2. Initialiser Tesseract une seule fois pour la vitesse
        let worker = null;
        async function initTesseract() {
            resultDisplay.innerText = "CHARGEMENT...";
            worker = await Tesseract.createWorker('eng');
            // CONFIGURATION CRUCIALE : On dit à Tesseract de ne chercher QUE des chiffres
            await worker.setParameters({
                tessedit_char_whitelist: '0123456789', 
            });
            resultDisplay.innerText = "SCANNER PRÊT";
        }
        initTesseract();

        btn.onclick = async () => {
            if(!worker) return;
            resultDisplay.innerText = "ANALYSE...";

            const ctx = canvas.getContext('2d');
            
            // On définit la zone de coupe (doit correspondre au rectangle #guide)
            const w = 500; // Largeur de capture
            const h = 160; // Hauteur de capture
            canvas.width = w;
            canvas.height = h;

            // Calcul du centre de la vidéo pour le découpage
            const sx = (video.videoWidth - w) / 2;
            const sy = (video.videoHeight - h) / 2;

            // On dessine juste le centre dans le canvas
            ctx.drawImage(video, sx, sy, w, h, 0, 0, w, h);

            // OPTIMISATION : On augmente le contraste directement ici
            ctx.globalCompositeOperation = 'contrast'; 
            
            const image = canvas.toDataURL('image/png');

            // 3. Reconnaissance
            const { data: { text } } = await worker.recognize(image);
            
            // Nettoyage final
            const finalDigits = text.trim().replace(/\s/g, '');
            resultDisplay.innerText = finalDigits || "???";
        };
    </script>
</body>
</html>
