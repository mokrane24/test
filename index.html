<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner Balance PaddleOCR</title>
    <script src="https://cdn.jsdelivr.net/npm/@paddlejs/paddleocr@0.1.2/dist/paddleocr.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body {
            margin: 0;
            background: #000;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }
        .camera-container {
            position: relative;
            width: 100%;
            height: 55vh;
            background: #000;
            overflow: hidden;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .visor {
            position: absolute;
            top: 30%;
            left: 15%;
            width: 70%;
            height: 18%;
            border: 3px solid #00ff00;
            box-shadow: 0 0 20px #00ff00;
            pointer-events: none;
            border-radius: 8px;
            background: rgba(0,255,0,0.05);
            z-index: 10;
        }
        .visor::after {
            content: "CADREZ ICI";
            position: absolute;
            bottom: -28px;
            left: 50%;
            transform: translateX(-50%);
            background: #00ff00;
            color: #000;
            font-size: 11px;
            font-weight: bold;
            padding: 3px 12px;
            border-radius: 20px;
            white-space: nowrap;
        }
        .controls {
            padding: 15px 20px;
            background: #0a0a0a;
            border-top: 1px solid #00ff00;
            overflow-y: auto;
            height: 45vh;
        }
        .weight-panel {
            background: #000;
            border: 2px solid #00ff00;
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 15px;
            text-align: center;
        }
        #weight {
            font-size: 4.5rem;
            font-weight: bold;
            font-family: monospace;
            letter-spacing: 4px;
            color: #00ff00;
            text-shadow: 0 0 10px #00ff00;
            word-break: break-word;
            min-height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .unit {
            font-size: 0.9rem;
            color: #88ff88;
            margin-top: 5px;
        }
        #status {
            font-size: 12px;
            background: #111;
            display: inline-block;
            padding: 8px 16px;
            border-radius: 30px;
            margin-bottom: 12px;
            font-weight: bold;
        }
        canvas {
            width: 100%;
            background: #000;
            border: 1px solid #333;
            border-radius: 8px;
            image-rendering: crisp-edges;
            margin-bottom: 10px;
            max-height: 80px;
        }
        .info {
            font-size: 10px;
            color: #6f6;
            text-align: center;
            margin-top: 12px;
            padding: 8px;
        }
        button {
            background: #00aa00;
            border: none;
            font-family: monospace;
            font-weight: bold;
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            color: #000;
            font-size: 12px;
        }
        button:hover {
            background: #00dd00;
        }
        .flex-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }
        .debug-section {
            background: #1a1a1a;
            padding: 12px;
            border-radius: 8px;
            margin-top: 10px;
            font-size: 10px;
            color: #0f0;
            border-left: 3px solid #0f0;
        }
        .edit-section {
            background: #1a1a1a;
            padding: 15px;
            border-left: 3px solid #ffaa00;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        .edit-input {
            width: 100%;
            padding: 12px;
            background: #000;
            border: 2px solid #ffaa00;
            color: #ffaa00;
            font-family: monospace;
            font-size: 1.8rem;
            text-align: center;
            border-radius: 8px;
            margin: 10px 0;
            font-weight: bold;
        }
        .edit-input:focus {
            outline: none;
            box-shadow: 0 0 10px #ffaa00;
        }
        .button-group {
            display: flex;
            gap: 10px;
            margin: 10px 0;
        }
        .button-group button {
            flex: 1;
            margin: 0;
        }
        .btn-validate {
            background: #00ff00;
        }
        .btn-cancel {
            background: #ff6666;
        }
        .spinner {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid #00ff00;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="camera-container">
    <video id="video" autoplay playsinline muted></video>
    <div class="visor"></div>
</div>

<div class="controls">
    <div class="flex-row">
        <div id="status">⏳ CHARGEMENT PADDLEOCR...</div>
        <button id="resetBtn" style="margin: 0; padding: 6px 12px;">🔄 RESET</button>
    </div>

    <div class="weight-panel">
        <div id="weight">----</div>
        <div class="unit">KILOGRAMMES (kg)</div>
    </div>

    <div class="edit-section" id="edit-section" style="display:none;">
        <div style="color: #ffaa00; margin-bottom: 8px; font-weight: bold;">✏️ MODIFIER LE RÉSULTAT :</div>
        <input type="text" id="edit-input" class="edit-input" placeholder="Valeur">
        <div class="button-group">
            <button class="btn-validate" id="btn-validate">✓ VALIDER</button>
            <button class="btn-cancel" id="btn-cancel">✗ ANNULER</button>
        </div>
    </div>

    <canvas id="debugCanvas" width="400" height="90"></canvas>
    
    <div class="debug-section">
        <div id="debug-info">Initialisation...</div>
    </div>

    <div class="info">
        🎯 PADDLEOCR - MEILLEUR OCR POUR CHIFFRES
    </div>
</div>

<script>
    (function() {
        const video = document.getElementById('video');
        const debugCanvas = document.getElementById('debugCanvas');
        const ctx = debugCanvas.getContext('2d');
        const weightDisplay = document.getElementById('weight');
        const statusDiv = document.getElementById('status');
        const resetBtn = document.getElementById('resetBtn');
        const debugInfo = document.getElementById('debug-info');
        const editSection = document.getElementById('edit-section');
        const editInput = document.getElementById('edit-input');
        const btnValidate = document.getElementById('btn-validate');
        const btnCancel = document.getElementById('btn-cancel');

        let isRunning = true;
        let lockedValue = null;
        let stabilityCounter = 0;
        let lastDetected = null;
        let roi = { x: 0.12, y: 0.38, width: 0.76, height: 0.20 };
        let ocr = null;
        let ocrReady = false;
        let isScanning = false;

        // ============= CHARGER PADDLEOCR =============
        async function initPaddleOCR() {
            try {
                debugInfo.innerText = "Chargement PaddleOCR...";
                
                // Charger depuis CDN avec fallback
                const PaddleOCR = window.PaddleOCR;
                
                if (!PaddleOCR) {
                    throw new Error('PaddleOCR non disponible');
                }
                
                ocr = new PaddleOCR.PaddleOCR();
                
                ocr.ready = false;
                
                // Attendre que le modèle soit chargé
                await new Promise(resolve => {
                    const checkReady = setInterval(() => {
                        if (ocr && ocr.ready) {
                            clearInterval(checkReady);
                            ocrReady = true;
                            resolve();
                        }
                    }, 500);
                    
                    // Timeout après 30 secondes
                    setTimeout(() => {
                        clearInterval(checkReady);
                        ocrReady = true;
                        resolve();
                    }, 30000);
                });
                
                debugInfo.innerText = '✅ PaddleOCR PRÊT';
                statusDiv.innerHTML = "🟢 PRÊT - CADREZ L'AFFICHAGE";
                statusDiv.style.color = "#00ff00";
                
            } catch(err) {
                console.error('PaddleOCR Error:', err);
                debugInfo.innerText = '⚠️ PaddleOCR: Fallback Tesseract';
                ocrReady = true; // Continuer avec Tesseract
                statusDiv.innerHTML = "🟡 MODE TESSERACT";
                statusDiv.style.color = "#ffff00";
            }
        }

        // ============= RECONNAISSANCE PADDLEOCR =============
        async function recognizeWithPaddleOCR(canvas) {
            try {
                if (!ocr) {
                    return { text: '', confidence: 0 };
                }

                const result = await ocr.recognize(canvas);
                
                if (!result || !result.data) {
                    return { text: '', confidence: 0 };
                }

                let fullText = '';
                let avgConfidence = 0;
                let count = 0;

                // Extraire et filtrer les textes détectés
                for (const item of result.data) {
                    const text = item.text || '';
                    const confidence = item.confidence || 0;
                    
                    // Garder uniquement les chiffres et points
                    const cleaned = text.replace(/[^0-9.]/g, '');
                    
                    if (cleaned && confidence > 0.1) {
                        fullText += cleaned;
                        avgConfidence += confidence;
                        count++;
                    }
                }

                return {
                    text: fullText,
                    confidence: count > 0 ? avgConfidence / count : 0
                };

            } catch(e) {
                console.error('PaddleOCR Recognition Error:', e);
                return { text: '', confidence: 0 };
            }
        }

        // ============= RECONNAISSANCE TESSERACT (FALLBACK) =============
        async function recognizeWithTesseract(canvas) {
            try {
                const { Tesseract } = window;
                if (!Tesseract) return { text: '', confidence: 0 };

                const result = await Tesseract.recognize(canvas, 'eng', {
                    tessedit_char_whitelist: '0123456789.,',
                    tessedit_pageseg_mode: '7',
                    tessedit_ocr_engine_mode: '1',
                });

                let text = result.data.text.trim();
                
                // Corrections
                text = text.replace(/O/g, '0').replace(/o/g, '0')
                           .replace(/I/g, '1').replace(/l/g, '1')
                           .replace(/Z/g, '2').replace(/B/g, '8')
                           .replace(/S/g, '5').replace(/G/g, '9');

                return { text, confidence: result.data.confidence };

            } catch(e) {
                console.error('Tesseract Error:', e);
                return { text: '', confidence: 0 };
            }
        }

        // ============= NETTOYAGE RESULTAT =============
        function cleanResult(text) {
            if (!text) return null;
            
            // Garder uniquement chiffres et points
            let cleaned = text.replace(/[^0-9.]/g, '');
            
            // Un seul point
            const parts = cleaned.split('.');
            if (parts.length > 2) {
                cleaned = parts[0] + '.' + parts.slice(1).join('');
            }

            // Format valide
            if (!cleaned || !/^[0-9]+(\.[0-9]{1,3})?$/.test(cleaned)) {
                return null;
            }

            // Plage poids valide (0-99999 kg)
            const val = parseFloat(cleaned);
            if (val < 0 || val > 99999) return null;

            return cleaned;
        }

        // ============= PREPROCESSING OPTIMAL =============
        function preprocessImage(ctx, width, height) {
            const imgData = ctx.getImageData(0, 0, width, height);
            const data = imgData.data;

            // Grayscale
            for (let i = 0; i < data.length; i += 4) {
                const gray = data[i] * 0.299 + data[i+1] * 0.587 + data[i+2] * 0.114;
                data[i] = data[i+1] = data[i+2] = gray;
            }

            // Contraste CLAHE-like (local adaptive)
            const blockSize = 16;
            for (let by = 0; by < height; by += blockSize) {
                for (let bx = 0; bx < width; bx += blockSize) {
                    const bh = Math.min(blockSize, height - by);
                    const bw = Math.min(blockSize, width - bx);

                    let min = 255, max = 0;
                    for (let y = by; y < by + bh; y++) {
                        for (let x = bx; x < bx + bw; x++) {
                            const val = data[(y * width + x) * 4];
                            min = Math.min(min, val);
                            max = Math.max(max, val);
                        }
                    }

                    const range = max - min || 1;
                    for (let y = by; y < by + bh; y++) {
                        for (let x = bx; x < bx + bw; x++) {
                            const idx = (y * width + x) * 4;
                            const normalized = ((data[idx] - min) / range) * 255;
                            data[idx] = data[idx+1] = data[idx+2] = normalized;
                        }
                    }
                }
            }

            ctx.putImageData(imgData, 0, 0);
        }

        // ============= SCAN PRINCIPAL =============
        async function captureAndRead() {
            if (!isRunning || !ocrReady || isScanning) {
                requestAnimationFrame(() => setTimeout(captureAndRead, 100));
                return;
            }

            if (video.videoWidth === 0) {
                requestAnimationFrame(() => setTimeout(captureAndRead, 100));
                return;
            }

            isScanning = true;

            try {
                const vw = video.videoWidth;
                const vh = video.videoHeight;
                const roiX = Math.floor(vw * roi.x);
                const roiY = Math.floor(vh * roi.y);
                const roiW = Math.floor(vw * roi.width);
                const roiH = Math.floor(vh * roi.height);

                // Capturer
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = 600;
                tempCanvas.height = 150;
                const tempCtx = tempCanvas.getContext('2d');
                tempCtx.drawImage(video, roiX, roiY, roiW, roiH, 0, 0, 600, 150);

                // Prétraiter
                preprocessImage(tempCtx, 600, 150);

                // Afficher debug
                ctx.drawImage(tempCanvas, 0, 0, debugCanvas.width, debugCanvas.height);

                // Reconnaître avec PaddleOCR ou Tesseract
                let result;
                if (ocrReady && ocr) {
                    result = await recognizeWithPaddleOCR(tempCanvas);
                } else {
                    result = await recognizeWithTesseract(tempCanvas);
                }

                const cleaned = cleanResult(result.text);

                if (cleaned && result.confidence > 0.15) {
                    if (lastDetected === cleaned) {
                        stabilityCounter++;
                    } else {
                        stabilityCounter = 1;
                        lastDetected = cleaned;
                    }

                    debugInfo.innerText = `"${cleaned}" | Conf: ${(result.confidence*100).toFixed(0)}% | Stab: ${stabilityCounter}/3`;

                    weightDisplay.innerHTML = cleaned;
                    weightDisplay.style.opacity = stabilityCounter >= 3 ? "1" : "0.6";
                    weightDisplay.style.color = stabilityCounter >= 3 ? "#00ff00" : "#88ff88";

                    if (stabilityCounter >= 3) {
                        if (lockedValue !== cleaned) {
                            lockedValue = cleaned;
                            statusDiv.innerHTML = "🔒 VERROUILLÉ !";
                            statusDiv.style.color = "#00ff00";
                            statusDiv.style.background = "#003300";

                            editInput.value = cleaned;
                            editSection.style.display = 'block';
                            editInput.focus();
                            editInput.select();
                        }
                    } else {
                        statusDiv.innerHTML = `🔄 STABILISATION (${stabilityCounter}/3)`;
                        statusDiv.style.color = "#ffff00";
                        statusDiv.style.background = "#1a1a00";
                    }
                } else {
                    stabilityCounter = 0;
                    debugInfo.innerText = `Pas de chiffre | Brut: "${result.text}" | Conf: ${(result.confidence*100).toFixed(0)}%`;
                    statusDiv.innerHTML = "🔍 RAPPROCHEZ-VOUS";
                    statusDiv.style.color = "#ff6666";
                    statusDiv.style.background = "#1a0000";
                }

            } catch(err) {
                console.error('Scan Error:', err);
                debugInfo.innerText = 'Erreur: ' + err.message;
            } finally {
                isScanning = false;
                setTimeout(captureAndRead, 500);
            }
        }

        // ============= ÉDITION =============
        btnValidate.addEventListener('click', function() {
            const value = editInput.value.trim();
            if (value && /^[0-9]+(\.[0-9]{1,3})?$/.test(value)) {
                lockedValue = value;
                weightDisplay.innerHTML = value;
                weightDisplay.style.color = "#00ff00";
                statusDiv.innerHTML = "✅ VALIDÉ MANUELLEMENT";
                statusDiv.style.color = "#00ff00";
                statusDiv.style.background = "#003300";
                editSection.style.display = 'none';
            } else {
                alert('Format invalide !');
            }
        });

        btnCancel.addEventListener('click', function() {
            editSection.style.display = 'none';
            stabilityCounter = 0;
            lastDetected = null;
        });

        function resetLock() {
            lockedValue = null;
            stabilityCounter = 0;
            lastDetected = null;
            weightDisplay.innerHTML = "----";
            weightDisplay.style.color = "#00ff00";
            editSection.style.display = 'none';
            statusDiv.innerHTML = "🔄 RÉINITIALISÉ";
            statusDiv.style.color = "#00ff00";
            statusDiv.style.background = "#003300";
        }

        resetBtn.addEventListener('click', resetLock);

        // ============= CAMÉRA =============
        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: { exact: "environment" },
                        width: { ideal: 1280 },
                        height: { ideal: 720 },
                        frameRate: { ideal: 15 }
                    }
                });
                video.srcObject = stream;
                await video.play();

                video.addEventListener('loadedmetadata', () => {
                    if (video.videoWidth > video.videoHeight) {
                        roi = { x: 0.15, y: 0.40, width: 0.70, height: 0.18 };
                    } else {
                        roi = { x: 0.10, y: 0.38, width: 0.80, height: 0.20 };
                    }
                    const visor = document.querySelector('.visor');
                    if (visor) {
                        visor.style.top = (roi.y * 100) + '%';
                        visor.style.left = (roi.x * 100) + '%';
                        visor.style.width = (roi.width * 100) + '%';
                        visor.style.height = (roi.height * 100) + '%';
                    }
                });

                setTimeout(() => {
                    if (video.videoWidth > 0) captureAndRead();
                }, 500);

            } catch(err) {
                statusDiv.innerHTML = "❌ ERREUR CAMÉRA";
                statusDiv.style.color = "#ff0000";
                debugInfo.innerText = err.message;
            }
        }

        window.addEventListener('beforeunload', () => {
            isRunning = false;
            if (video.srcObject) {
                video.srcObject.getTracks().forEach(track => track.stop());
            }
        });

        // LANCER
        initPaddleOCR();
        initCamera();

    })();
</script>
</body>
</html>
