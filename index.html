<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Scanner Balance PRO</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>
body { margin:0; background:#000; color:#fff; font-family:monospace; }
#video { width:100%; height:50vh; }
#weight { font-size:4rem; text-align:center; color:red; }
.roi { position:absolute; border:3px solid red; top:30%; left:20%; width:60%; height:15%; }
</style>
</head>

<body>

<div style="position:relative">
<video id="video" autoplay playsinline></video>
<div class="roi"></div>
</div>

<div id="weight">----</div>
<button onclick="scan()">SCAN</button>

<canvas id="canvas" width="400" height="100"></canvas>

<script>

const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const weight = document.getElementById('weight');

navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
.then(stream => video.srcObject = stream);

// =======================
// PREPROCESSING ULTRA
// =======================
function preprocess(imgData) {
    const d = imgData.data;

    for (let i = 0; i < d.length; i += 4) {
        const r = d[i];
        const g = d[i+1];
        const b = d[i+2];

        // 🔴 Isolation LED rouge AMÉLIORÉE
        const isRed =
            r > 120 &&
            g < 80 &&
            b < 80 &&
            r > g * 1.5 &&
            r > b * 1.5;

        let val = isRed ? 255 : 0;

        d[i] = d[i+1] = d[i+2] = val;
    }

    return imgData;
}

// =======================
// UPSCALE (TRÈS IMPORTANT)
// =======================
function upscale(sourceCanvas) {
    const big = document.createElement('canvas');
    big.width = sourceCanvas.width * 2;
    big.height = sourceCanvas.height * 2;

    const bctx = big.getContext('2d');
    bctx.imageSmoothingEnabled = false;
    bctx.drawImage(sourceCanvas, 0, 0, big.width, big.height);

    return big;
}

// =======================
// OCR NUMÉRIQUE
// =======================
async function readDigits(canvas) {
    const result = await Tesseract.recognize(
        canvas,
        'eng',
        {
            tessedit_char_whitelist: '0123456789',
            tessedit_pageseg_mode: 7
        }
    );

    return result.data.text.replace(/\D/g, '');
}

// =======================
// SCAN
// =======================
async function scan() {

    const vw = video.videoWidth;
    const vh = video.videoHeight;

    const x = vw * 0.2;
    const y = vh * 0.3;
    const w = vw * 0.6;
    const h = vh * 0.15;

    ctx.drawImage(video, x, y, w, h, 0, 0, 400, 100);

    let imgData = ctx.getImageData(0, 0, 400, 100);
    imgData = preprocess(imgData);
    ctx.putImageData(imgData, 0, 0);

    // 🔥 upscale avant OCR
    const bigCanvas = upscale(canvas);

    // OCR
    const text = await readDigits(bigCanvas);

    if (text) {
        weight.innerText = text;
        weight.style.color = "lime";
    } else {
        weight.innerText = "----";
        weight.style.color = "red";
    }
}

</script>

</body>
</html>
