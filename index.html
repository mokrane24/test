<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner Balance - Ajustement ROI</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #000; color: #fff; font-family: monospace; }
        
        .container { display: flex; flex-direction: column; height: 100vh; }
        
        #video { 
            width: 100%; 
            height: 50vh; 
            display: block;
            position: relative;
        }
        
        .roi-guide {
            position: absolute;
            top: 20%;
            left: 5%;
            width: 90%;
            height: 30%;
            border: 3px dashed #0f0;
            box-shadow: 0 0 15px #0f0;
            pointer-events: none;
            z-index: 10;
        }
        
        .controls { 
            background: #0a0a0a;
            padding: 20px;
            overflow-y: auto;
            flex: 1;
        }
        
        .section {
            margin-bottom: 20px;
            background: #1a1a1a;
            padding: 15px;
            border-radius: 8px;
            border-left: 3px solid #0f0;
        }
        
        .section-title {
            font-weight: bold;
            margin-bottom: 10px;
            color: #0f0;
        }
        
        #weight { 
            font-size: 4rem; 
            font-weight: bold; 
            color: #0f0;
            margin: 20px 0;
            text-align: center;
        }
        
        button { 
            padding: 12px 25px; 
            font-size: 14px; 
            background: #0f0; 
            color: #000; 
            border: none; 
            cursor: pointer; 
            font-weight: bold;
            margin: 5px;
            border-radius: 4px;
        }
        
        button:hover { background: #0a0; }
        button:disabled { background: #666; cursor: not-allowed; }
        
        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        canvas { 
            width: 100%;
            border: 1px solid #333;
            margin: 10px 0;
            background: #000;
        }
        
        #info { 
            color: #666; 
            margin-top: 10px; 
            font-size: 12px;
            line-height: 1.6;
        }
        
        .roi-controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 10px 0;
        }
        
        .roi-controls label {
            font-size: 11px;
            color: #0f0;
        }
        
        .roi-controls input {
            width: 100%;
            padding: 5px;
            background: #000;
            border: 1px solid #0f0;
            color: #0f0;
            font-family: monospace;
            font-size: 12px;
        }
        
        .preview-container {
            background: #000;
            padding: 10px;
            border: 1px solid #333;
            border-radius: 4px;
        }
    </style>
</head>
<body>

<div class="container">
    <div style="position: relative;">
        <video id="video" autoplay playsinline muted></video>
        <div class="roi-guide"></div>
    </div>

    <div class="controls">
        <!-- RÉSULTAT -->
        <div class="section">
            <div class="section-title">📊 RÉSULTAT</div>
            <div id="weight">----</div>
            <div id="info">En attente...</div>
        </div>

        <!-- CONTRÔLES ROI -->
        <div class="section">
            <div class="section-title">🎯 AJUSTER LA RÉGION (ROI)</div>
            <div class="roi-controls">
                <label>Haut (%):<br><input type="number" id="roi-top" value="20" min="0" max="100" step="5"></label>
                <label>Hauteur (%):<br><input type="number" id="roi-height" value="30" min="5" max="100" step="5"></label>
                <label>Gauche (%):<br><input type="number" id="roi-left" value="5" min="0" max="95" step="5"></label>
                <label>Largeur (%):<br><input type="number" id="roi-width" value="90" min="10" max="100" step="5"></label>
            </div>
            <p style="font-size: 11px; color: #666;">Ajustez les sliders jusqu'à cadrer les chiffres dans la vidéo</p>
        </div>

        <!-- APERÇU CAPTURÉ -->
        <div class="section">
            <div class="section-title">📷 CE QUI EST CAPTURÉ</div>
            <div class="preview-container">
                <canvas id="preview" width="400" height="120"></canvas>
            </div>
        </div>

        <!-- BOUTONS -->
        <div class="section">
            <div class="section-title">🎬 ACTIONS</div>
            <div class="button-group">
                <button id="scan">📸 SCANNER</button>
                <button id="reset">🔄 RESET</button>
            </div>
        </div>
    </div>
</div>

<script>
    const video = document.getElementById('video');
    const scanBtn = document.getElementById('scan');
    const resetBtn = document.getElementById('reset');
    const weight = document.getElementById('weight');
    const preview = document.getElementById('preview');
    const info = document.getElementById('info');
    const roiTopInput = document.getElementById('roi-top');
    const roiHeightInput = document.getElementById('roi-height');
    const roiLeftInput = document.getElementById('roi-left');
    const roiWidthInput = document.getElementById('roi-width');
    const roiGuide = document.querySelector('.roi-guide');

    let locked = null;
    let stability = 0;
    let lastText = null;
    let roi = { top: 20, height: 30, left: 5, width: 90 };

    // Mise à jour guide visuel
    function updateGuide() {
        roiGuide.style.top = roi.top + '%';
        roiGuide.style.left = roi.left + '%';
        roiGuide.style.width = roi.width + '%';
        roiGuide.style.height = roi.height + '%';
    }

    roiTopInput.addEventListener('change', (e) => { roi.top = parseInt(e.target.value); updateGuide(); });
    roiHeightInput.addEventListener('change', (e) => { roi.height = parseInt(e.target.value); updateGuide(); });
    roiLeftInput.addEventListener('change', (e) => { roi.left = parseInt(e.target.value); updateGuide(); });
    roiWidthInput.addEventListener('change', (e) => { roi.width = parseInt(e.target.value); updateGuide(); });

    // Caméra
    navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
        .then(stream => {
            video.srcObject = stream;
            info.innerText = '✓ Caméra active\n\nAjustez les sliders pour cadrer les chiffres,\npuis cliquez SCANNER';
        })
        .catch(err => {
            info.innerText = '✗ Erreur caméra:\n' + err.message;
        });

    scanBtn.addEventListener('click', async () => {
        if (video.videoWidth === 0) {
            info.innerText = '✗ Vidéo non prête';
            return;
        }

        scanBtn.disabled = true;
        info.innerText = '⏳ Scan en cours...';

        // Calculer les pixels à partir des pourcentages
        const vw = video.videoWidth;
        const vh = video.videoHeight;
        
        const x = Math.floor(vw * (roi.left / 100));
        const y = Math.floor(vh * (roi.top / 100));
        const w = Math.floor(vw * (roi.width / 100));
        const h = Math.floor(vh * (roi.height / 100));

        // Créer canvas pour OCR
        const canvas = document.createElement('canvas');
        canvas.width = 600;
        canvas.height = 180;
        const ctx = canvas.getContext('2d');
        
        // Capturer la région
        ctx.drawImage(video, x, y, w, h, 0, 0, 600, 180);

        // Afficher dans preview
        const pctx = preview.getContext('2d');
        pctx.drawImage(canvas, 0, 0, preview.width, preview.height);

        // Log de debug
        console.log(`Capture: x=${x}, y=${y}, w=${w}, h=${h}`);

        try {
            // OCR sur l'image capturée
            const result = await Tesseract.recognize(canvas, 'eng', {
                tessedit_char_whitelist: '0123456789.',
                tessedit_pageseg_mode: '7',
                tessedit_ocr_engine_mode: '1'
            });

            let text = result.data.text.trim();
            
            // Nettoyer
            text = text.replace(/[^0-9.]/g, '');
            
            // Garder un seul point
            if (text.includes('.')) {
                const parts = text.split('.');
                text = parts[0] + '.' + parts[1].substring(0, 2);
            }

            info.innerText = `Brut: "${result.data.text}"\nNettoyé: "${text}"\nConfiance: ${(result.data.confidence * 100).toFixed(0)}%`;

            if (!text) {
                weight.innerText = '----';
                weight.style.color = '#f00';
                info.innerText += '\n✗ Aucun chiffre détecté\nTry d\'ajuster les sliders';
                scanBtn.disabled = false;
                return;
            }

            // Stabilité
            if (lastText === text) {
                stability++;
            } else {
                stability = 1;
                lastText = text;
            }

            weight.innerText = text;
            info.innerText += `\nStabilité: ${stability}/3`;

            if (stability >= 3) {
                weight.style.color = '#0f0';
                locked = text;
                info.innerText += '\n✓ VERROUILLÉ';
            } else {
                weight.style.color = '#ff0';
            }

        } catch(e) {
            weight.innerText = '----';
            weight.style.color = '#f00';
            info.innerText = '✗ Erreur OCR:\n' + e.message;
            console.error(e);
        }

        scanBtn.disabled = false;
    });

    resetBtn.addEventListener('click', () => {
        locked = null;
        stability = 0;
        lastText = null;
        weight.innerText = '----';
        weight.style.color = '#0f0';
        info.innerText = 'Réinitialisé';
    });

    updateGuide();
</script>
</body>
</html>
