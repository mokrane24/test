<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner Balance Pro - Sans Erreur</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body {
            margin: 0;
            background: #000;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }
        .camera-container {
            position: relative;
            width: 100%;
            height: 55vh;
            background: #000;
            overflow: hidden;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .visor {
            position: absolute;
            top: 30%;
            left: 15%;
            width: 70%;
            height: 18%;
            border: 3px solid #00ff00;
            box-shadow: 0 0 20px #00ff00;
            pointer-events: none;
            border-radius: 8px;
            background: rgba(0,255,0,0.05);
            z-index: 10;
        }
        .visor::after {
            content: "CADREZ ICI";
            position: absolute;
            bottom: -28px;
            left: 50%;
            transform: translateX(-50%);
            background: #00ff00;
            color: #000;
            font-size: 11px;
            font-weight: bold;
            padding: 3px 12px;
            border-radius: 20px;
            white-space: nowrap;
        }
        .controls {
            padding: 15px 20px;
            background: #0a0a0a;
            border-top: 1px solid #00ff00;
        }
        .weight-panel {
            background: #000;
            border: 2px solid #00ff00;
            border-radius: 16px;
            padding: 10px;
            margin-bottom: 15px;
            text-align: center;
        }
        #weight {
            font-size: 4rem;
            font-weight: bold;
            font-family: monospace;
            letter-spacing: 4px;
            color: #00ff00;
            text-shadow: 0 0 5px #00ff00;
            word-break: break-word;
        }
        .unit {
            font-size: 0.9rem;
            color: #88ff88;
        }
        #status {
            font-size: 11px;
            background: #111;
            display: inline-block;
            padding: 6px 16px;
            border-radius: 30px;
            margin-bottom: 12px;
            font-weight: bold;
        }
        canvas {
            width: 100%;
            background: #000;
            border: 1px solid #333;
            border-radius: 8px;
            image-rendering: crisp-edges;
        }
        .info {
            font-size: 10px;
            color: #6f6;
            text-align: center;
            margin-top: 12px;
            padding: 8px;
        }
        button {
            background: #00aa00;
            border: none;
            font-family: monospace;
            font-weight: bold;
            padding: 6px 14px;
            border-radius: 30px;
            margin-left: 10px;
            cursor: pointer;
            color: #000;
        }
        .flex-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .locked-badge {
            color: #00ff00;
            font-size: 10px;
            margin-left: 10px;
        }
    </style>
</head>
<body>

<div class="camera-container">
    <video id="video" autoplay playsinline muted></video>
    <div class="visor"></div>
</div>

<div class="controls">
    <div class="flex-row">
        <div id="status">🔴 DÉMARRAGE...</div>
        <button id="resetBtn">🔄 RÉINITIALISER</button>
    </div>
    <div class="weight-panel">
        <div id="weight">----</div>
        <div class="unit">KILOGRAMMES (kg)</div>
    </div>
    <canvas id="debugCanvas" width="400" height="90" style="width:100%; height:auto;"></canvas>
    <div class="info">
        🎯 PLACEZ LES CHIFFRES DANS LE CADRE VERT → ATTENDEZ LE VERROUILLAGE AUTO
    </div>
</div>

<script>
    (function() {
        // Éléments
        const video = document.getElementById('video');
        const debugCanvas = document.getElementById('debugCanvas');
        const ctx = debugCanvas.getContext('2d');
        const weightDisplay = document.getElementById('weight');
        const statusDiv = document.getElementById('status');
        const resetBtn = document.getElementById('resetBtn');

        // État
        let isRunning = true;
        let lockedValue = null;           // Valeur verrouillée finale
        let pendingValue = null;           // Valeur en cours de stabilisation
        let stabilityCounter = 0;          // Compteur de stabilité
        let lastRawValue = null;
        
        // Zone de capture (ROI) - ajustée pour capturer uniquement les chiffres
        let roi = { x: 0.12, y: 0.38, width: 0.76, height: 0.20 };
        
        // ========== PRÉTRAITEMENT ULTRA SIMPLE MAIS EFFICACE ==========
        function preprocessImage(ctx, width, height) {
            const imgData = ctx.getImageData(0, 0, width, height);
            const data = imgData.data;
            
            // 1. Convertir en niveaux de gris et calculer luminosité moyenne
            let sum = 0;
            for (let i = 0; i < data.length; i += 4) {
                const gray = (data[i] + data[i+1] + data[i+2]) / 3;
                sum += gray;
            }
            const avg = sum / (data.length / 4);
            
            // 2. Seuil adaptatif : on cherche les caractères (généralement plus clairs que le fond)
            const threshold = avg + 25;
            
            // 3. Binarisation + inversion pour avoir texte noir sur fond blanc (optimal pour Tesseract)
            for (let i = 0; i < data.length; i += 4) {
                const gray = (data[i] + data[i+1] + data[i+2]) / 3;
                // Si c'est plus clair que le seuil -> caractère (devient noir après inversion)
                const isBright = gray > threshold;
                // On veut du texte NOIR sur fond BLANC
                const value = isBright ? 0 : 255;
                data[i] = value;     // R
                data[i+1] = value;   // G
                data[i+2] = value;   // B
            }
            
            ctx.putImageData(imgData, 0, 0);
        }
        
        // ========== NETTOYAGE DES RÉSULTATS OCR ==========
        function cleanOCRResult(text) {
            // Garder uniquement chiffres, points et virgules
            let cleaned = text.replace(/[^0-9,.]/g, '');
            // Remplacer virgule par point
            cleaned = cleaned.replace(/,/g, '.');
            // Extraire le premier nombre trouvé
            const match = cleaned.match(/\d+(?:\.\d+)?/);
            if (!match) return null;
            
            let number = match[0];
            // Supprimer les zéros inutiles au début
            number = number.replace(/^0+/, '');
            if (number === '') number = '0';
            
            // Vérifier que c'est un poids plausible (0 à 80000 kg pour semi-remorque)
            const val = parseFloat(number);
            if (isNaN(val)) return null;
            if (val >= 0 && val <= 90000) return number;
            
            return null;
        }
        
        // ========== CAPTURE + OCR ==========
        async function captureAndRead() {
            if (!isRunning) return;
            if (!video.videoWidth || video.videoHeight === 0) {
                requestAnimationFrame(() => setTimeout(captureAndRead, 150));
                return;
            }
            
            // Calculer la zone d'intérêt
            const vw = video.videoWidth;
            const vh = video.videoHeight;
            const roiX = Math.floor(vw * roi.x);
            const roiY = Math.floor(vh * roi.y);
            const roiW = Math.floor(vw * roi.width);
            const roiH = Math.floor(vh * roi.height);
            
            if (roiW < 40 || roiH < 20) {
                setTimeout(captureAndRead, 200);
                return;
            }
            
            // Capturer la zone sur un canvas temporaire
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = 400;
            tempCanvas.height = 90;
            const tempCtx = tempCanvas.getContext('2d');
            tempCtx.drawImage(video, roiX, roiY, roiW, roiH, 0, 0, 400, 90);
            
            // Prétraiter
            preprocessImage(tempCtx, 400, 90);
            
            // Afficher dans le debug
            ctx.clearRect(0, 0, debugCanvas.width, debugCanvas.height);
            ctx.drawImage(tempCanvas, 0, 0, debugCanvas.width, debugCanvas.height);
            
            // Lancer OCR
            try {
                const result = await Tesseract.recognize(
                    tempCanvas,
                    'eng',
                    {
                        tessedit_char_whitelist: '0123456789.,',
                        tessedit_pageseg_mode: '7',      // Une seule ligne
                        tessedit_ocr_engine_mode: '1'     // LSTM uniquement
                    }
                );
                
                const rawText = result.data.text;
                const cleanedWeight = cleanOCRResult(rawText);
                
                // Gestion de la stabilisation et verrouillage automatique
                if (cleanedWeight && cleanedWeight.length >= 2) {
                    // Si c'est la même valeur que la précédente
                    if (lastRawValue === cleanedWeight) {
                        stabilityCounter++;
                    } else {
                        stabilityCounter = 1;
                        lastRawValue = cleanedWeight;
                    }
                    
                    // Afficher la valeur en cours (temporaire)
                    weightDisplay.innerHTML = cleanedWeight;
                    weightDisplay.style.opacity = "0.7";
                    
                    // Après 3 lectures identiques consécutives -> VERROUILLAGE
                    if (stabilityCounter >= 3) {
                        if (lockedValue !== cleanedWeight) {
                            lockedValue = cleanedWeight;
                            weightDisplay.innerHTML = cleanedWeight;
                            weightDisplay.style.opacity = "1";
                            statusDiv.innerHTML = "🔒 VERROUILLÉ ! POIDS STABLE";
                            statusDiv.style.color = "#00ff00";
                            statusDiv.style.background = "#003300";
                        } else {
                            statusDiv.innerHTML = "✅ VERROUILLAGE ACTIF - OK";
                            statusDiv.style.color = "#88ff88";
                        }
                    } else {
                        statusDiv.innerHTML = `🔄 STABILISATION (${stabilityCounter}/3)`;
                        statusDiv.style.color = "#ffff00";
                    }
                } else {
                    // Pas de chiffre détecté
                    stabilityCounter = 0;
                    lastRawValue = null;
                    
                    if (lockedValue) {
                        // Garder la dernière valeur verrouillée
                        weightDisplay.innerHTML = lockedValue;
                        weightDisplay.style.opacity = "1";
                        statusDiv.innerHTML = "⏸️ EN ATTENTE - CADREZ L'AFFICHAGE";
                        statusDiv.style.color = "#ffaa00";
                    } else {
                        weightDisplay.innerHTML = "----";
                        weightDisplay.style.opacity = "1";
                        statusDiv.innerHTML = "🔍 AUCUN CHIFFRE - RAPPROCHEZ-VOUS";
                        statusDiv.style.color = "#ff6666";
                    }
                }
                
            } catch(e) {
                console.error("OCR Error:", e);
                statusDiv.innerHTML = "⚠️ ERREUR LECTURE";
            }
            
            // Boucle toutes les 300ms pour ne pas surcharger
            setTimeout(captureAndRead, 300);
        }
        
        // ========== RÉINITIALISATION DU VERROUILLAGE ==========
        function resetLock() {
            lockedValue = null;
            pendingValue = null;
            stabilityCounter = 0;
            lastRawValue = null;
            weightDisplay.innerHTML = "----";
            statusDiv.innerHTML = "🔄 VERROUILLAGE RÉINITIALISÉ";
            statusDiv.style.color = "#00ff00";
            setTimeout(() => {
                if (!lockedValue) statusDiv.innerHTML = "🔍 CADREZ LES CHIFFRES";
            }, 1500);
        }
        
        // ========== INITIALISATION CAMÉRA ==========
        async function initCamera() {
            try {
                const constraints = {
                    video: {
                        facingMode: { exact: "environment" },
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    }
                };
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;
                await video.play();
                
                statusDiv.innerHTML = "🟢 PRÊT - CADREZ L'AFFICHAGE";
                statusDiv.style.color = "#00ff00";
                
                // Ajuster la ROI après chargement
                video.addEventListener('loadedmetadata', () => {
                    if (video.videoWidth > video.videoHeight) {
                        // Paysage
                        roi = { x: 0.15, y: 0.40, width: 0.70, height: 0.18 };
                    } else {
                        // Portrait
                        roi = { x: 0.10, y: 0.38, width: 0.80, height: 0.20 };
                    }
                    // Mettre à jour l'affichage du viseur
                    const visor = document.querySelector('.visor');
                    if (visor) {
                        visor.style.top = (roi.y * 100) + '%';
                        visor.style.left = (roi.x * 100) + '%';
                        visor.style.width = (roi.width * 100) + '%';
                        visor.style.height = (roi.height * 100) + '%';
                    }
                });
                
                // Démarrer le scan
                setTimeout(() => {
                    if (video.videoWidth > 0) captureAndRead();
                }, 500);
                
            } catch(err) {
                console.error(err);
                statusDiv.innerHTML = "❌ CAMÉRA INACCESSIBLE - PERMISSIONS";
                statusDiv.style.color = "#ff0000";
            }
        }
        
        // Événements
        resetBtn.addEventListener('click', resetLock);
        
        // Nettoyage
        window.addEventListener('beforeunload', () => {
            isRunning = false;
            if (video.srcObject) {
                video.srcObject.getTracks().forEach(track => track.stop());
            }
        });
        
        // LANCER
        initCamera();
        
    })();
</script>
</body>
</html>
